<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Mall Finder — Official Map</title><style>:root{--b:#0757b8;--y:#ffe100;--bg:#f4f6fa;--ink:#111827;--m:#667085;--line:#dfe3ea;--red:#ef4444;--purple:#7c3aed}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--ink)}button{font:inherit}.head{padding:calc(14px + env(safe-area-inset-top)) 14px 12px;background:#fff;border-bottom:1px solid var(--line)}.title{font-size:20px;font-weight:900}.sub{font-size:13px;color:var(--m);margin-top:3px}.tools{padding:12px 14px}.seg{display:grid;grid-template-columns:1fr 1fr;background:#e9edf3;border-radius:14px;padding:4px;margin-bottom:12px}.seg button{border:0;background:transparent;padding:10px;border-radius:11px;font-weight:800}.seg .on{background:#fff;box-shadow:0 2px 8px #0001}.entrances{display:grid;grid-template-columns:1fr 1fr;gap:8px}.entrance{border:1px solid var(--line);background:#fff;border-radius:14px;padding:11px 9px;font-weight:800}.entrance.on{background:var(--y);border-color:var(--y)}.toggle{display:flex;align-items:center;gap:8px;margin-top:10px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:11px 12px}.toggle input{width:20px;height:20px}.mapWrap{position:relative;margin:0 14px 14px;background:#fff;border:1px solid var(--line);border-radius:20px;overflow:hidden}.mapWrap img{display:block;width:100%;height:auto}.overlay{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}.route{fill:none;stroke:var(--red);stroke-width:10;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:18 10;animation:dash 1s linear infinite}.route.access{stroke:var(--purple)}@keyframes dash{to{stroke-dashoffset:-28}}.start{fill:#12b76a;stroke:#fff;stroke-width:4}.pin{fill:var(--y);stroke:#111827;stroke-width:4}.upper{display:none;margin:0 14px 14px;background:#fff;border:1px solid var(--line);border-radius:20px;padding:14px}.upper.show{display:block}.upperGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.unit{min-height:110px;border:2px solid #222;border-radius:14px;display:grid;place-items:center;text-align:center;font-weight:900;padding:12px}.note{margin:0 14px 22px;background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px}.note p{margin:5px 0 0;color:var(--m);line-height:1.45}</style></head><body><div class="head"><div class="title">Vaal Mall — route prototype</div><div class="sub">Official map base · fixed view for reliable testing</div></div><div class="tools"><div class="seg"><button id="groundBtn" class="on">Ground Floor</button><button id="upperBtn">Upper Level</button></div><div class="entrances" id="entrances"><button class="entrance" data-key="west">West / Banking Court</button><button class="entrance" data-key="south">South / Main</button><button class="entrance on" data-key="east">East / Woolworths side</button><button class="entrance" data-key="north">North entrance</button></div><label class="toggle"><input type="checkbox" id="access"><span><b>Accessible route</b><br><small>Show route in purple</small></span></label></div><div class="mapWrap" id="ground"><img src="https://vaalmallshopping.co.za/wp-content/uploads/2026/04/Vaal-Mall-Mall-Map-File_page-0001.jpg" alt="Official Vaal Mall floor plan"><svg class="overlay" id="overlay" viewBox="0 0 1400 850" preserveAspectRatio="none"></svg></div><div class="upper" id="upper"><div class="upperGrid"><div class="unit">Ster-Kinekor</div><div class="unit">John Dory’s</div><div class="unit">Grubhouse</div><div class="unit">Gold Rush</div><div class="unit">Stairs / escalator</div><div class="unit">Upper-level toilets</div></div></div><div class="note" id="note"><b>Route to Woolworths</b><p>Tap a different entrance above. The green start marker and route should visibly jump to that side of the mall.</p></div><script>const overlay=document.getElementById('overlay'),access=document.getElementById('access'),buttons=[...document.querySelectorAll('.entrance')],ground=document.getElementById('ground'),upper=document.getElementById('upper');let selected='east';const pts={west:[170,500],south:[690,805],east:[1240,625],north:[730,95],wool:[1110,555]};const routes={west:[[170,500],[320,500],[500,485],[690,470],[880,495],[1110,555]],south:[[690,805],[690,650],[690,470],[880,495],[1110,555]],east:[[1240,625],[1190,600],[1110,555]],north:[[730,95],[730,250],[710,365],[690,470],[880,495],[1110,555]]};function draw(){const p=routes[selected],str=p.map(v=>v.join(',')).join(' '),s=pts[selected];overlay.innerHTML='<polyline class="route '+(access.checked?'access':'')+'" points="'+str+'"/><circle class="start" cx="'+s[0]+'" cy="'+s[1]+'" r="16"/><circle class="pin" cx="'+pts.wool[0]+'" cy="'+pts.wool[1]+'" r="17"/>';document.getElementById('note').innerHTML='<b>'+(access.checked?'Accessible ':'')+'route to Woolworths</b><p>Starting from '+buttons.find(b=>b.dataset.key===selected).textContent+'.</p>'}buttons.forEach(b=>b.addEventListener('click',()=>{selected=b.dataset.key;buttons.forEach(x=>x.classList.toggle('on',x===b));draw()}));access.addEventListener('change',draw);document.getElementById('groundBtn').onclick=()=>{ground.style.display='block';upper.classList.remove('show');document.getElementById('groundBtn').classList.add('on');document.getElementById('upperBtn').classList.remove('on')};document.getElementById('upperBtn').onclick=()=>{ground.style.display='none';upper.classList.add('show');document.getElementById('upperBtn').classList.add('on');document.getElementById('groundBtn').classList.remove('on')};draw();</script></body></html>
