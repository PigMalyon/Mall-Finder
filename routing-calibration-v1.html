<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Vaal Mall Routing Calibration</title><style>:root{--b:#0757b8;--y:#ffe100;--bg:#f4f6fa;--ink:#111827;--m:#667085;--line:#dfe3ea;--red:#ef4444}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--ink)}button,select{font:inherit}.app{max-width:980px;margin:auto;padding:16px}.panel{background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px;margin-bottom:12px}.controls{display:flex;gap:8px;flex-wrap:wrap}.controls button,.controls select{border:1px solid var(--line);background:#fff;border-radius:999px;padding:10px 13px;font-weight:800}.controls button.on{background:var(--y);border-color:var(--y)}.map{position:relative;background:#fff;border:1px solid var(--line);border-radius:18px;overflow:hidden}.map img{display:block;width:100%;height:auto}.map svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}.graph{fill:none;stroke:#2563eb;stroke-width:4;opacity:.25}.routeHalo{fill:none;stroke:#fff;stroke-width:18;stroke-linecap:round;stroke-linejoin:round}.route{fill:none;stroke:var(--red);stroke-width:9;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:16 9}.start{fill:#12b76a;stroke:#fff;stroke-width:5}.end{fill:var(--y);stroke:#111827;stroke-width:5}.muted{color:var(--m);font-size:13px}</style></head><body><div class="app"><div class="panel"><b>Vaal Mall routing calibration V1</b><div class="muted">This page tests the rebuilt walkway graph only. Tenant interiors are excluded.</div></div><div class="panel"><div class="controls" id="entrances"><button class="on" data-start="west">West / Banking Court</button><button data-start="south">South / Main entrance</button><button data-start="east">East / Woolworths side</button><button data-start="north">North / Banking precinct</button><select id="destination"><option value="edgars">Edgars</option><option value="wool">Woolworths</option><option value="pnp">Pick n Pay</option><option value="clicks">Clicks</option><option value="dischem">Dis-Chem</option><option value="footgear">Footgear</option><option value="mrps">Mr Price Sport</option><option value="stairs">Upper-level stairs/escalator</option></select></div></div><div class="map"><img src="https://vaalmallshopping.co.za/wp-content/uploads/2026/04/Vaal-Mall-Mall-Map-File_page-0001.jpg" alt="Official Vaal Mall map"><svg id="svg" viewBox="0 0 1536 914" preserveAspectRatio="none"></svg></div><div class="panel" id="note"></div></div><script>const P={west:[86,452],w1:[155,452],w2:[220,450],w3:[260,420],w4:[285,392],edgars:[310,390],m1:[350,394],m2:[410,402],m3:[470,412],m4:[530,420],m5:[590,425],stairs:[625,430],m6:[680,433],m7:[740,435],m8:[800,432],wool:[858,420],m9:[905,404],m10:[950,380],m11:[1000,372],pnp:[1070,392],east:[1108,404],north:[1010,135],n1:[992,180],n2:[978,222],clicks:[968,252],n3:[972,290],n4:[962,328],n5:[948,360],south:[348,820],s1:[330,780],s2:[305,735],s3:[286,690],dischem:[402,706],s4:[280,630],s5:[278,575],s6:[282,520],s7:[292,470],b1:[455,458],b2:[475,500],b3:[495,545],b4:[515,590],b5:[530,635],footgear:[548,702],mrps:[572,770]};const E=[['west','w1'],['w1','w2'],['w2','w3'],['w3','w4'],['w4','edgars'],['w4','m1'],['m1','m2'],['m2','m3'],['m3','m4'],['m4','m5'],['m5','stairs'],['stairs','m6'],['m6','m7'],['m7','m8'],['m8','wool'],['m8','m9'],['m9','m10'],['m10','m11'],['m11','pnp'],['pnp','east'],['north','n1'],['n1','n2'],['n2','clicks'],['clicks','n3'],['n3','n4'],['n4','n5'],['n5','m10'],['south','s1'],['s1','s2'],['s2','s3'],['s3','dischem'],['s3','s4'],['s4','s5'],['s5','s6'],['s6','s7'],['s7','w3'],['m2','b1'],['b1','b2'],['b2','b3'],['b3','b4'],['b4','b5'],['b5','footgear'],['footgear','mrps']];const labels={west:'West / Banking Court',south:'South / Main entrance',east:'East / Woolworths side',north:'North / Banking precinct'};let start='west';const svg=document.getElementById('svg'),dest=document.getElementById('destination'),note=document.getElementById('note');function d(a,b){return Math.hypot(P[a][0]-P[b][0],P[a][1]-P[b][1])}function shortest(s,t){const open=[s],dist={},prev={},seen=new Set;Object.keys(P).forEach(k=>dist[k]=Infinity);dist[s]=0;while(open.length){open.sort((a,b)=>dist[a]-dist[b]);const cur=open.shift();if(seen.has(cur))continue;seen.add(cur);if(cur===t)break;for(const [a,b] of E){if(a!==cur&&b!==cur)continue;const nb=a===cur?b:a,nd=dist[cur]+d(cur,nb);if(nd<dist[nb]){dist[nb]=nd;prev[nb]=cur;open.push(nb)}}}const out=[];for(let cur=t;cur;cur=prev[cur])out.unshift(cur);return out[0]===s?out:[]}function draw(){const graph=E.map(([a,b])=>`<line class="graph" x1="${P[a][0]}" y1="${P[a][1]}" x2="${P[b][0]}" y2="${P[b][1]}"></line>`).join('');const path=shortest(start,dest.value),pts=path.map(k=>P[k]),points=pts.map(p=>p.join(',')).join(' ');svg.innerHTML=graph+`<polyline class="routeHalo" points="${points}"></polyline><polyline class="route" points="${points}"></polyline><circle class="start" cx="${pts[0][0]}" cy="${pts[0][1]}" r="18"></circle><circle class="end" cx="${pts.at(-1)[0]}" cy="${pts.at(-1)[1]}" r="18"></circle>`;note.innerHTML=`<b>${labels[start]} → ${dest.options[dest.selectedIndex].text}</b><div class="muted">Blue lines show the digitised walkway graph. The red route can only use those lines.</div>`}document.querySelectorAll('[data-start]').forEach(b=>b.onclick=()=>{start=b.dataset.start;document.querySelectorAll('[data-start]').forEach(x=>x.classList.toggle('on',x===b));draw()});dest.onchange=draw;draw();</script></body></html>
