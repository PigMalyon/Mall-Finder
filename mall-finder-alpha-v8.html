<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Mall Finder Alpha V8</title>
<style>
:root{--green:#006b45;--blue:#0b6df2;--yellow:#ffd60a;--ink:#101828;--muted:#667085;--bg:#f4f7fb;--card:#fff;--line:#e4e7ec;--danger:#b42318}
*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink)}button,input,select{font:inherit}.app{max-width:430px;margin:auto;min-height:100vh;background:#f8fafc;padding-bottom:88px}.top{background:linear-gradient(135deg,#032d25,#006b45);color:#fff;padding:20px 18px 22px;border-radius:0 0 28px 28px}.brand,.row{display:flex;align-items:center;justify-content:space-between;gap:12px}.brand h1{font-size:25px;margin:0}.mall{font-size:13px;opacity:.9;margin-top:4px}.avatar{width:38px;height:38px;border-radius:50%;background:#ffffff20;display:grid;place-items:center;font-weight:800}.search{margin-top:18px}.search input{width:100%;border:0;border-radius:16px;padding:15px 16px;font-size:16px;box-shadow:0 8px 24px #001b1433}.content{padding:16px}.quick{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.quick button,.card,.sheet,.result{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:0 8px 25px #1018280d}.quick button{padding:16px;text-align:left}.quick b{display:block;margin-top:8px}.section{margin-top:18px}.section h2{font-size:17px;margin:0 0 10px}.chips{display:flex;gap:8px;overflow:auto}.chip{border:1px solid #d0d5dd;background:#fff;border-radius:999px;padding:9px 12px;white-space:nowrap}.chip.active{background:#101828;color:#fff}.results{display:grid;gap:10px}.result{padding:14px;display:flex;gap:12px;align-items:center}.badge{width:46px;height:46px;border-radius:14px;background:#101010;color:#fff;display:grid;place-items:center;font-weight:900;font-size:13px}.meta{flex:1}.meta h3{margin:0 0 3px;font-size:15px}.meta p{margin:0;color:var(--muted);font-size:12px}.btn{border:0;border-radius:13px;padding:12px 13px;font-weight:850}.green{background:var(--green);color:#fff}.yellow{background:var(--yellow)}.outline{background:#fff;border:1px solid #d0d5dd}.danger{background:#fff0ee;color:var(--danger)}.view{display:none}.sheet{padding:16px}.hero{display:flex;gap:14px;align-items:center}.logo{width:64px;height:64px;border-radius:16px;background:#111;color:#fff;display:grid;place-items:center;font-size:25px;font-weight:900}.actions{display:grid;grid-template-columns:1.35fr 1fr;gap:8px;margin-top:16px}.rows{margin-top:14px;border-top:1px solid var(--line)}.detail{padding:13px 0;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:12px}.detail small{color:var(--muted)}.pref{display:flex;gap:10px;align-items:flex-start;padding:13px 0;border-bottom:1px solid var(--line)}.pref input{margin-top:4px}.pref label{flex:1}.pref small{display:block;color:var(--muted);margin-top:3px}.map{margin-top:12px;background:#edf1f4;border-radius:22px;min-height:390px;overflow:hidden;border:1px solid #d0d5dd}.map svg{width:100%;height:390px}.shop{fill:#e7e9ee;stroke:#c9ced8}.shopText{font-size:10px;fill:#475467;font-weight:700}.road{stroke:#fff;stroke-width:22;stroke-linecap:round;fill:none}.route{stroke:var(--blue);stroke-width:9;fill:none;stroke-linecap:round}.accessible{stroke:#0a8f63}.routeAnim{stroke:#a8cbff;stroke-width:3;fill:none;stroke-linecap:round;stroke-dasharray:10 18;animation:flow 1s linear infinite}.you{fill:var(--blue);stroke:#fff;stroke-width:5}.dest{fill:#111;stroke:#fff;stroke-width:4}.instruction{margin-top:12px;background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px;display:flex;gap:12px;align-items:center}.turn{width:46px;height:46px;border-radius:50%;background:var(--green);color:#fff;display:grid;place-items:center;font-size:24px;font-weight:900}.routeMeta{display:flex;gap:16px;color:var(--muted);font-size:13px;margin-top:10px}.pill{display:inline-block;background:#ecfdf3;color:#05603a;border:1px solid #abefc6;border-radius:999px;padding:6px 9px;font-size:12px;font-weight:800}.bottom{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:min(430px,100%);background:#fff;border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(4,1fr);padding:9px 6px max(12px,env(safe-area-inset-bottom));z-index:5}.bottom button{border:0;background:none;color:#667085;font-size:12px}.bottom b{display:block;font-size:19px}.bottom .active{color:var(--green);font-weight:900}.empty{padding:28px;text-align:center;color:var(--muted)}@keyframes flow{to{stroke-dashoffset:-28}}@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="app">
<header class="top"><div class="brand"><div><h1>Mall Finder</h1><div class="mall">📍 Vaal Mall · Alpha V8</div></div><div class="avatar">DM</div></div><div class="search"><input id="search" placeholder="Search stores, food or facilities"></div></header>
<main class="content">
<section id="home"><div class="quick"><button data-filter="All">🛍️<b>Stores</b><small>Browse directory</small></button><button data-filter="Facilities">🚻<b>Facilities</b><small>Toilets, ATMs and more</small></button><button id="routePrefsBtn">♿<b>Route preferences</b><small>Accessible and low-stair routes</small></button><button id="nearestEntranceBtn">🚪<b>Best entrance</b><small>Closest entrance to destination</small></button></div><div class="section"><h2>Explore</h2><div id="chips" class="chips"></div></div><div class="section"><div class="row"><h2 id="listTitle">Popular</h2><small id="count"></small></div><div id="results" class="results"></div></div></section>
<section id="storeView" class="view"><div class="sheet"><div class="hero"><div id="storeLogo" class="logo"></div><div><h2 id="storeName" style="margin:0"></h2><div id="storeStatus" style="color:#087443;font-size:13px;margin-top:4px"></div><div id="storeMeta" style="color:#667085;font-size:13px;margin-top:4px"></div></div></div><div class="actions"><button id="navigateBtn" class="btn green">Navigate</button><button id="backBtn" class="btn outline">Back</button></div><div id="storeRows" class="rows"></div></div></section>
<section id="prefsView" class="view"><div class="sheet"><div class="row"><div><h2 style="margin:0">Route preferences</h2><small style="color:#667085">Saved on this device</small></div><button id="closePrefs" class="btn outline">Done</button></div><div class="pref"><input id="stepFree" type="checkbox"><label for="stepFree"><b>Step-free route</b><small>Avoid stairs and use ramps or lifts.</small></label></div><div class="pref"><input id="avoidEscalators" type="checkbox"><label for="avoidEscalators"><b>Avoid escalators</b><small>Prefer lifts and level corridors.</small></label></div><div class="pref"><input id="wideRoutes" type="checkbox"><label for="wideRoutes"><b>Prefer wider corridors</b><small>Better for wheelchairs, prams and trolleys.</small></label></div><div class="pref"><input id="quietRoutes" type="checkbox"><label for="quietRoutes"><b>Prefer quieter routes</b><small>Avoid busy food-court and promotion areas where possible.</small></label></div></div></section>
<section id="routeView" class="view"><div class="sheet"><div class="row"><div><small id="routeFrom"></small><h2 id="routeTitle" style="margin:5px 0 0"></h2></div><button id="cancelRoute" class="btn outline">Cancel</button></div><div class="routeMeta"><span id="routeDistance"></span><span id="routeTime"></span></div><div id="routeBadge" style="margin-top:10px"></div></div><div class="map"><svg viewBox="0 0 400 390" aria-label="Simplified Vaal Mall route"><rect class="shop" x="35" y="52" width="95" height="75" rx="8"/><text class="shopText" x="52" y="92">EDGARS</text><rect class="shop" x="135" y="48" width="72" height="82" rx="8"/><text class="shopText" x="147" y="92">MR PRICE</text><rect class="shop" x="210" y="42" width="120" height="92" rx="8"/><text class="shopText" x="246" y="90">WOOLWORTHS</text><rect class="shop" x="287" y="190" width="76" height="70" rx="8"/><text class="shopText" x="300" y="225">CLICKS</text><rect class="shop" x="110" y="230" width="110" height="82" rx="8"/><text class="shopText" x="132" y="270">ACKERMANS</text><rect class="shop" x="230" y="250" width="125" height="85" rx="8"/><text class="shopText" x="263" y="295">FOOD COURT</text><path class="road" d="M28 170 C85 168 120 145 165 152 C215 160 246 174 298 159 C335 148 360 158 382 177"/><path class="road" d="M167 152 C163 210 181 252 216 320"/><path id="routePath" class="route" d="M28 170 C85 168 120 145 165 152 C215 160 246 174 298 159"/><path class="routeAnim" d="M28 170 C85 168 120 145 165 152 C215 160 246 174 298 159"/><circle class="you" cx="28" cy="170" r="11"/><path class="dest" d="M298 137 C312 137 320 147 320 159 C320 175 298 192 298 192 C298 192 276 175 276 159 C276 147 284 137 298 137Z"/></svg></div><div class="instruction"><div class="turn">↑</div><div><h3 id="instructionTitle" style="margin:0 0 3px"></h3><p id="instructionSub" style="margin:0;color:#667085;font-size:13px"></p></div></div></section>
</main>
<nav class="bottom"><button id="homeTab" class="active"><b>⌂</b>Home</button><button id="searchTab"><b>⌕</b>Search</button><button id="prefsTab"><b>♿</b>Routes</button><button id="mapTab"><b>🗺</b>Map</button></nav>
</div>
<script>
(()=>{"use strict";
const $=id=>document.getElementById(id);
const places=[
{id:"woolworths",name:"Woolworths",category:"Fashion",floor:"Ground floor",distance:142,time:2,icon:"W",hours:[9,18],entrance:"East / Woolworths side",accessible:true},
{id:"clicks",name:"Clicks",category:"Health",floor:"Ground floor",distance:210,time:3,icon:"C",hours:[9,18],entrance:"North entrance",accessible:true},
{id:"wimpy",name:"Wimpy",category:"Food",floor:"Ground floor",distance:165,time:2,icon:"W",hours:[8,19],entrance:"Food Court entrance",accessible:true},
{id:"mr-price-sport",name:"Mr Price Sport",category:"Fashion",floor:"Ground floor",distance:188,time:3,icon:"MPS",hours:[9,18],entrance:"PEP entrance",accessible:true},
{id:"ackermans",name:"Ackermans",category:"Fashion",floor:"Ground floor",distance:225,time:3,icon:"A",hours:[9,18],entrance:"South entrance",accessible:true},
{id:"atm",name:"ATM",category:"Facilities",floor:"Ground floor",distance:98,time:1,icon:"ATM",hours:[8,20],entrance:"PEP entrance",accessible:true},
{id:"toilets",name:"Accessible toilets",category:"Facilities",floor:"Ground floor",distance:120,time:2,icon:"WC",hours:[8,20],entrance:"Food Court entrance",accessible:true}
];
const views=["home","storeView","prefsView","routeView"];
const state={filter:"All",query:"",selected:null,prefs:loadPrefs()};
function loadPrefs(){try{return JSON.parse(localStorage.getItem("mfRoutePrefs"))||{stepFree:false,avoidEscalators:false,wideRoutes:false,quietRoutes:false}}catch{return{stepFree:false,avoidEscalators:false,wideRoutes:false,quietRoutes:false}}}
function savePrefs(){state.prefs={stepFree:$('stepFree').checked,avoidEscalators:$('avoidEscalators').checked,wideRoutes:$('wideRoutes').checked,quietRoutes:$('quietRoutes').checked};localStorage.setItem("mfRoutePrefs",JSON.stringify(state.prefs))}
function applyPrefs(){Object.entries(state.prefs).forEach(([k,v])=>$(k).checked=v)}
function show(id){views.forEach(v=>$(v).style.display=v===id?"block":"none");document.querySelectorAll('.bottom button').forEach(b=>b.classList.remove('active'));if(id==='home')$('homeTab').classList.add('active');if(id==='prefsView')$('prefsTab').classList.add('active');if(id==='routeView')$('mapTab').classList.add('active');window.scrollTo({top:0,behavior:'smooth'})}
function status(p){const h=new Date().getHours(),open=h>=p.hours[0]&&h<p.hours[1];return{open,text:open?`● Open until ${String(p.hours[1]).padStart(2,'0')}:00`:`● Closed · Opens ${String(p.hours[0]).padStart(2,'0')}:00`}}
function filtered(){return places.filter(p=>(state.filter==='All'||p.category===state.filter)&&p.name.toLowerCase().includes(state.query.toLowerCase()))}
function renderChips(){const cats=['All','Fashion','Food','Health','Facilities'];$('chips').innerHTML=cats.map(c=>`<button class="chip ${c===state.filter?'active':''}" data-cat="${c}">${c}</button>`).join('');document.querySelectorAll('[data-cat]').forEach(b=>b.onclick=()=>{state.filter=b.dataset.cat;renderChips();renderList()})}
function renderList(){const list=filtered();$('listTitle').textContent=state.query?'Search results':state.filter==='All'?'Popular':state.filter;$('count').textContent=`${list.length} place${list.length===1?'':'s'}`;$('results').innerHTML=list.length?list.map(p=>{const s=status(p);return`<div class="result" data-id="${p.id}"><div class="badge">${p.icon}</div><div class="meta"><h3>${p.name}</h3><p><span style="color:${s.open?'#087443':'#b42318'}">${s.text}</span> · ${p.floor} · ${p.time} min</p></div><button class="btn yellow">View</button></div>`}).join(''):'<div class="empty card">No matching places found.</div>';document.querySelectorAll('.result').forEach(r=>r.onclick=()=>openPlace(r.dataset.id))}
function openPlace(id){const p=places.find(x=>x.id===id),s=status(p);state.selected=p;$('storeLogo').textContent=p.icon;$('storeName').textContent=p.name;$('storeStatus').textContent=s.text;$('storeStatus').style.color=s.open?'#087443':'#b42318';$('storeMeta').textContent=`${p.category} · ${p.floor}`;$('storeRows').innerHTML=`<div class="detail"><div><b>Nearest entrance</b><br><small>${p.entrance}</small></div><b>${p.time} min</b></div><div class="detail"><div><b>Accessibility</b><br><small>Step-free entrance available</small></div><b>♿</b></div>`;show('storeView')}
function routeProfile(){const p=state.prefs;const active=Object.values(p).some(Boolean);const extras=(p.stepFree?35:0)+(p.avoidEscalators?20:0)+(p.wideRoutes?15:0)+(p.quietRoutes?30:0);return{active,extras,label:p.stepFree?'Step-free route':p.quietRoutes?'Quieter route':'Preferred route'}}
function startRoute(){const target=state.selected||places[0],profile=routeProfile(),distance=target.distance+profile.extras,time=Math.max(1,Math.ceil(distance/75));$('routeTitle').textContent=target.name;$('routeFrom').textContent=`Best entrance: ${target.entrance}`;$('routeDistance').textContent=`${distance} m`;$('routeTime').textContent=`${time} min walk`;$('routeBadge').innerHTML=profile.active?`<span class="pill">♿ ${profile.label}</span>`:'';$('routePath').classList.toggle('accessible',profile.active);$('instructionTitle').textContent=profile.active?'Follow the accessible corridor':'Continue along the main corridor';$('instructionSub').textContent=profile.active?'Lifts and step-free paths are prioritised':'Your destination is straight ahead';show('routeView')}
$('search').oninput=e=>{state.query=e.target.value;state.filter='All';renderChips();renderList();show('home')};document.querySelectorAll('[data-filter]').forEach(b=>b.onclick=()=>{state.filter=b.dataset.filter;state.query='';$('search').value='';renderChips();renderList()});$('navigateBtn').onclick=startRoute;$('backBtn').onclick=()=>show('home');$('routePrefsBtn').onclick=()=>{applyPrefs();show('prefsView')};$('nearestEntranceBtn').onclick=()=>{state.selected=places[0];startRoute()};$('closePrefs').onclick=()=>{savePrefs();show('home')};['stepFree','avoidEscalators','wideRoutes','quietRoutes'].forEach(id=>$(id).onchange=savePrefs);$('cancelRoute').onclick=()=>state.selected?show('storeView'):show('home');$('homeTab').onclick=()=>show('home');$('searchTab').onclick=()=>{show('home');$('search').focus()};$('prefsTab').onclick=()=>{applyPrefs();show('prefsView')};$('mapTab').onclick=startRoute;applyPrefs();renderChips();renderList();
})();
</script>
</body>
</html>
