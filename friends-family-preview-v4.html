<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Mall Finder Preview V4</title><style>:root{--b:#0757b8;--y:#ffe100;--bg:#f4f6fa;--ink:#111827;--m:#667085;--line:#dfe3ea;--red:#ef4444}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--ink)}button,input{font:inherit}.app{max-width:720px;margin:auto}.hero{background:linear-gradient(145deg,#0757b8,#043b7b);color:#fff;padding:24px 18px;border-radius:0 0 28px 28px}.hero h1{margin:18px 0 8px;font-size:34px}.search{display:flex;gap:8px}.search input{flex:1;border:0;border-radius:14px;padding:14px}.search button{border:0;border-radius:14px;background:var(--y);padding:0 18px;font-weight:900}.content{padding:16px}.toolbar,.tabs,.sorts,.entrances,.floors{display:flex;gap:8px;overflow:auto}.toolbar{justify-content:space-between;align-items:center;margin-bottom:12px}.tab,.sort,.clear,.entrance,.floor,.back{border:1px solid var(--line);background:#fff;border-radius:999px;padding:9px 12px;font-weight:800;white-space:nowrap}.on{background:var(--y);border-color:var(--y)}.status,.card,.product,.note{background:#fff;border:1px solid var(--line);border-radius:18px}.status,.note{padding:14px;margin-bottom:12px}.list{display:grid;gap:10px}.card,.product{padding:13px}.card{display:flex;align-items:center;gap:12px}.icon{width:46px;height:46px;border-radius:14px;background:#eef4fb;display:grid;place-items:center;font-size:22px}.main{flex:1}.main b{display:block}.muted{color:var(--m);font-size:13px}.routebtn{border:0;background:var(--b);color:#fff;border-radius:12px;padding:10px 12px;font-weight:900}.price{font-size:24px;font-weight:950;color:var(--b)}.productTop{display:flex;justify-content:space-between;gap:12px}.stock{display:inline-block;margin-top:6px;padding:5px 8px;border-radius:999px;font-size:12px;font-weight:900;background:#dcfae6;color:#067647}.screen{display:none;position:fixed;inset:0;background:var(--bg);z-index:20;overflow:auto}.screen.show{display:block}.head{position:sticky;top:0;z-index:3;background:#fff;padding:12px 14px;border-bottom:1px solid var(--line);display:flex;gap:10px;align-items:center}.mapcard{padding:14px}.map{position:relative;overflow:hidden;border-radius:16px;background:#fff;border:1px solid var(--line)}.map img{display:block;width:100%;height:auto}.map svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}.route{fill:none;stroke:var(--red);stroke-width:10;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:17 10}.start{fill:#12b76a;stroke:#fff;stroke-width:5}.end{fill:var(--y);stroke:#111827;stroke-width:5}.upper{display:none;grid-template-columns:1fr 1fr;gap:10px;padding:14px}.upper.show{display:grid}.unit{min-height:110px;border:2px solid #222;border-radius:14px;background:#fff;display:grid;place-items:center;text-align:center;font-weight:900;padding:10px}.unit.selected{background:var(--y)}.footer{text-align:center;color:var(--m);font-size:12px;margin:18px 0}</style></head><body><div class="app"><div class="hero"><b>🛍️ Mall Finder · Vaal Mall</b><h1>Find it. Get there faster.</h1><div class="search"><input id="q" placeholder="Try Woolworths, shoes, Grubhouse"><button id="searchBtn">Search</button></div></div><div class="content"><div class="toolbar"><div class="tabs"><button class="tab on" data-mode="all">All</button><button class="tab" data-mode="stores">Stores</button><button class="tab" data-mode="products">Products</button></div><button class="clear" id="clear">Clear</button></div><div class="sorts" id="sorts" style="display:none;margin-bottom:12px"><button class="sort on" data-sort="relevance">Relevance</button><button class="sort" data-sort="low">Price: low</button><button class="sort" data-sort="high">Price: high</button></div><div class="status" id="status"><b>Friends & Family Preview V4</b><div class="muted">Reliable destination selection and corridor-side store entrances.</div></div><div class="list" id="results"></div><div class="footer">Sample prices and stock are demonstrative only.</div></div></div><section class="screen" id="mapScreen"><div class="head"><button class="back" id="back">‹ Back</button><div><b id="mapTitle">Route</b><span class="muted" id="mapSub">Ground floor</span></div></div><div class="mapcard"><div class="floors" style="margin-bottom:10px"><button class="floor on" data-floor="ground">Ground floor</button><button class="floor" data-floor="upper">Upper level</button></div><div class="entrances" style="margin-bottom:10px"><button class="entrance" data-key="west">West / Banking Court</button><button class="entrance" data-key="south">South / Main</button><button class="entrance on" data-key="east">East / Woolworths side</button><button class="entrance" data-key="north">North entrance</button></div><div class="map" id="ground"><img src="https://vaalmallshopping.co.za/wp-content/uploads/2026/04/Vaal-Mall-Mall-Map-File_page-0001.jpg" alt="Official Vaal Mall map"><svg id="svg" viewBox="0 0 1400 850" preserveAspectRatio="none"></svg></div><div class="upper" id="upper"><button class="unit" data-upper="Ster-Kinekor">Ster-Kinekor</button><button class="unit" data-upper="John Dory’s">John Dory’s</button><button class="unit" data-upper="Grubhouse">Grubhouse</button><button class="unit" data-upper="Gold Rush">Gold Rush</button><button class="unit" data-upper="Stairs / escalator">Stairs / escalator</button><button class="unit" data-upper="Upper-level toilets">Upper-level toilets</button></div><div class="note" id="note" style="margin-top:12px"></div></div></section><script>const stores=[{n:'Woolworths',c:'Department Store',i:'🛍️',floor:'ground',node:'e4'},{n:'Edgars',c:'Department Store',i:'🛍️',floor:'ground',node:'w3'},{n:'Pick n Pay',c:'Department Store',i:'🛒',floor:'ground',node:'e2'},{n:'Dis-Chem',c:'Health & Beauty',i:'💊',floor:'ground',node:'s2'},{n:'Clicks',c:'Health & Beauty',i:'💊',floor:'ground',node:'n4'},{n:'Mr Price Sport',c:'Sports',i:'👟',floor:'ground',node:'s4'},{n:'Footgear',c:'Footwear',i:'👟',floor:'ground',node:'s3'},{n:'Grubhouse',c:'Restaurant · Upper level',i:'🍽️',floor:'upper'},{n:'Ster-Kinekor',c:'Entertainment · Upper level',i:'🎬',floor:'upper'},{n:'John Dory’s',c:'Restaurant · Upper level',i:'🍽️',floor:'upper'},{n:'Gold Rush',c:'Entertainment · Upper level',i:'🎰',floor:'upper'}];const products=[{n:"Levi's 511 Slim Jeans",s:'Woolworths',p:899,t:['levi','jeans','clothing']},{n:"Levi's 511 Slim Jeans",s:'Edgars',p:949,t:['levi','jeans','clothing']},{n:'Ladies black court shoe',s:'Footgear',p:499,t:['shoe','shoes','footwear']},{n:'Everyday sneaker',s:'Mr Price Sport',p:699,t:['shoe','shoes','sneaker','footwear']},{n:'Adidas Runfalcon 5',s:'Mr Price Sport',p:1399,t:['shoe','shoes','running','footwear']}];const nodes={west:[120,510],w1:[220,510],w2:[300,470],w3:[330,390],c1:[430,470],c2:[540,500],hub:[700,470],e1:[850,470],e2:[970,430],e3:[1060,500],e4:[1120,560],east:[1270,640],south:[690,820],s1:[690,690],s2:[470,620],s3:[540,590],s4:[610,590],north:[730,70],n1:[730,210],n2:[760,330],n3:[860,280],n4:[960,210],stairs:[620,470]};const edges=[['west','w1'],['w1','w2'],['w2','w3'],['w2','c1'],['c1','c2'],['c2','hub'],['hub','e1'],['e1','e2'],['e2','e3'],['e3','e4'],['east','e4'],['south','s1'],['s1','hub'],['s1','s4'],['s4','s3'],['s3','s2'],['s3','c2'],['north','n1'],['n1','n2'],['n2','hub'],['n2','n3'],['n3','n4'],['hub','stairs']];const labels={west:'West / Banking Court',south:'South / Main',east:'East / Woolworths side',north:'North entrance'};let mode='all',sort='relevance',selectedEntrance='east',destination=stores[0];const $=id=>document.getElementById(id),results=$('results'),q=$('q'),svg=$('svg'),note=$('note'),mapScreen=$('mapScreen'),sorts=$('sorts');function distance(a,b){const A=nodes[a],B=nodes[b];return Math.hypot(A[0]-B[0],A[1]-B[1])}function shortest(start,end){const open=[start],d={},prev={},seen=new Set;Object.keys(nodes).forEach(n=>d[n]=Infinity);d[start]=0;while(open.length){open.sort((a,b)=>d[a]-d[b]);const n=open.shift();if(seen.has(n))continue;seen.add(n);if(n===end)break;for(const e of edges){if(!e.includes(n))continue;const nb=e[0]===n?e[1]:e[0],nd=d[n]+distance(n,nb);if(nd<d[nb]){d[nb]=nd;prev[nb]=n;open.push(nb)}}}const path=[];for(let cur=end;cur;cur=prev[cur])path.unshift(cur);return path[0]===start?path:[]}function setFloor(f){document.querySelectorAll('.floor').forEach(x=>x.classList.toggle('on',x.dataset.floor===f));$('ground').style.display=f==='ground'?'block':'none';$('upper').classList.toggle('show',f==='upper');$('mapSub').textContent=f==='ground'?'Ground floor':'Upper level'}function drawRoute(){document.querySelectorAll('.unit').forEach(x=>x.classList.remove('selected'));$('mapTitle').textContent=destination.n;if(destination.floor==='upper'){setFloor('upper');document.querySelectorAll('.unit').forEach(x=>x.classList.toggle('selected',x.dataset.upper===destination.n));note.innerHTML='<b>Route to '+destination.n+'</b><div class="muted">From '+labels[selectedEntrance]+', follow the ground-floor corridor to the stairs/escalator, then continue upstairs.</div>';return}setFloor('ground');const path=shortest(selectedEntrance,destination.node),pts=path.map(n=>nodes[n]);svg.innerHTML='<polyline class="route" points="'+pts.map(v=>v.join(',')).join(' ')+'"></polyline><circle class="start" cx="'+pts[0][0]+'" cy="'+pts[0][1]+'" r="18"></circle><circle class="end" cx="'+pts[pts.length-1][0]+'" cy="'+pts[pts.length-1][1]+'" r="18"></circle>';note.innerHTML='<b>Shortest mapped corridor route to '+destination.n+'</b><div class="muted">Starting from '+labels[selectedEntrance]+'. The route ends at the corridor-side shop entrance.</div>'}function render(){const t=q.value.trim().toLowerCase();let ss=stores.filter(x=>!t||(x.n+' '+x.c).toLowerCase().includes(t));let ps=products.filter(x=>!t||(x.n+' '+x.s+' '+x.t.join(' ')).toLowerCase().includes(t));if(sort==='low')ps.sort((a,b)=>a.p-b.p);if(sort==='high')ps.sort((a,b)=>b.p-a.p);sorts.style.display=mode==='products'||(mode==='all'&&t)?'flex':'none';let h='';if(mode!=='products')h+=ss.map(x=>'<div class="card" data-destination="'+x.n+'"><div class="icon">'+x.i+'</div><div class="main"><b>'+x.n+'</b><div class="muted">'+x.c+'</div></div><button class="routebtn">Route</button></div>').join('');if(mode!=='stores')h+=ps.map(x=>'<div class="product" data-destination="'+x.s+'"><div class="productTop"><div><b>'+x.n+'</b><div class="muted">'+x.s+'</div><span class="stock">In stock</span></div><div class="price">R'+x.p+'</div></div><button class="routebtn" style="margin-top:10px">Route to store</button></div>').join('');results.innerHTML=h||'<div class="status"><b>No results</b><div class="muted">Try a broader search.</div></div>';$('status').innerHTML='<b>'+ss.length+' stores · '+ps.length+' products</b><div class="muted">Preview results</div>'}document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{mode=b.dataset.mode;document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('on',x===b));render()});document.querySelectorAll('.sort').forEach(b=>b.onclick=()=>{sort=b.dataset.sort;document.querySelectorAll('.sort').forEach(x=>x.classList.toggle('on',x===b));render()});$('searchBtn').onclick=render;q.oninput=render;$('clear').onclick=()=>{q.value='';mode='all';sort='relevance';destination=stores[0];document.querySelectorAll('.tab').forEach((x,i)=>x.classList.toggle('on',i===0));document.querySelectorAll('.sort').forEach((x,i)=>x.classList.toggle('on',i===0));render()};results.addEventListener('click',e=>{const card=e.target.closest('[data-destination]');if(!card)return;const found=stores.find(x=>x.n===card.dataset.destination);if(!found)return;destination=found;drawRoute();mapScreen.classList.add('show')});document.querySelectorAll('.entrance').forEach(b=>b.onclick=()=>{selectedEntrance=b.dataset.key;document.querySelectorAll('.entrance').forEach(x=>x.classList.toggle('on',x===b));drawRoute()});document.querySelectorAll('.floor').forEach(b=>b.onclick=()=>setFloor(b.dataset.floor));document.querySelectorAll('.unit[data-upper]').forEach(b=>b.onclick=()=>{const found=stores.find(x=>x.n===b.dataset.upper);destination=found||{n:b.dataset.upper,floor:'upper'};drawRoute()});$('back').onclick=()=>mapScreen.classList.remove('show');render();drawRoute();</script></body></html>
