<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Mall Finder Alpha V3</title><style>:root{--blue:#0b6df2;--yellow:#ffe100;--ink:#101828;--muted:#667085;--bg:#f3f6fb;--green:#12b76a;--red:#f04438}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink)}.app{max-width:430px;margin:auto;min-height:100vh;background:#f8fafc;padding-bottom:86px}.top{background:linear-gradient(135deg,#0b6df2,#174ea6);color:#fff;padding:20px 18px 26px;border-radius:0 0 26px 26px}.brand{display:flex;justify-content:space-between;align-items:center}.brand h1{font-size:24px;margin:0}.mall{font-size:13px;opacity:.9;margin-top:4px}.pill{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:800;background:#ffffff25}.search{margin-top:18px}.search input{width:100%;border:0;border-radius:16px;padding:15px;font-size:16px}.content{padding:16px}.quick{display:grid;grid-template-columns:1fr 1fr;gap:12px}.quick button,.card,.result{background:#fff;border:1px solid #e4e7ec;border-radius:18px}.quick button{padding:16px;text-align:left}.quick b{display:block;margin-top:8px}.section{margin-top:18px}.section h2{font-size:17px;margin:0 0 10px}.results{display:grid;gap:10px}.result{padding:14px;display:flex;gap:12px;align-items:center}.badge{width:44px;height:44px;border-radius:14px;background:#eef4ff;display:grid;place-items:center;color:var(--blue);font-weight:900}.meta{flex:1}.meta h3{margin:0 0 3px;font-size:15px}.meta p{margin:0;color:var(--muted);font-size:12px}.btn{border:0;border-radius:13px;padding:11px 13px;font-weight:900}.yellow{background:var(--yellow)}.blue{background:var(--blue);color:#fff}.outline{background:#fff;border:1px solid #d0d5dd}.card{padding:16px}.banner{display:none;background:#fff7d6;border:1px solid #f5d90a;border-radius:16px;padding:12px;margin-top:12px;font-size:13px}.zoneBox{margin-top:12px;background:#fff;border:1px solid #e4e7ec;border-radius:16px;padding:12px}.zoneBox label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}.zoneBox select{width:100%;border:1px solid #d0d5dd;border-radius:12px;padding:11px;background:#fff}.lab{background:#eef4ff;border:1px solid #b2ccff}.lab label{display:flex;justify-content:space-between;gap:12px;align-items:center}.routeView{display:none}.routeHead{display:flex;justify-content:space-between;align-items:start}.metrics{display:flex;gap:18px;color:var(--muted);font-size:13px;margin-top:12px}.map{margin-top:10px;background:#101820;border-radius:20px;min-height:320px}.map svg{width:100%;height:320px}.road{stroke:#fff;stroke-width:14;stroke-linecap:round}.routeBase{stroke:var(--red);stroke-width:10;fill:none;stroke-linecap:round}.flow{stroke:#ffd0d0;stroke-width:4;fill:none;stroke-linecap:round;stroke-dasharray:18 28;animation:flow 1s linear infinite}.dot{fill:#3b82f6;stroke:#fff;stroke-width:4}.stop{fill:#7c3aed;stroke:#fff;stroke-width:4}.dest{fill:var(--yellow);stroke:#111;stroke-width:4}.steps{display:grid;gap:8px;margin-top:12px}.step{background:#fff;border:1px solid #e4e7ec;border-radius:14px;padding:12px;display:flex;gap:10px}.step span{width:28px;height:28px;border-radius:50%;background:#eef4ff;color:var(--blue);display:grid;place-items:center;font-weight:900}.choice{display:none;margin-top:12px}.choice button{width:100%;margin-top:8px}.bottom{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:min(430px,100%);background:#fff;border-top:1px solid #e4e7ec;display:grid;grid-template-columns:repeat(4,1fr);padding:9px 6px 12px}.bottom button{border:0;background:none;color:#667085;font-size:12px}.bottom b{display:block;font-size:19px}.bottom .active{color:var(--blue);font-weight:900}@keyframes flow{to{stroke-dashoffset:-46}}@media(prefers-reduced-motion:reduce){.flow{animation:none}}</style></head><body><div class="app"><header class="top"><div class="brand"><div><h1>Mall Finder</h1><div class="mall">📍 Vaal Mall</div></div><span id="parkingType" class="pill">🅿 Free parking zone</span></div><div class="search"><input id="search" placeholder="Search stores, food or facilities"></div></header><main class="content"><section id="home"><div class="quick"><button id="parkBtn">🅿️<b>Save parking</b><small>Remember your parking zone</small></button><button id="carBtn">🚗<b>Return to my car</b><small>Smart return route</small></button></div><div class="zoneBox"><label for="parkingZone">Parking zone for this test</label><select id="parkingZone"><option value="vaal-east">Vaal Mall East — Free</option><option value="demo-free">Demo Mall Open Parking — Free</option><option value="demo-paid">Demo Mall Basement — Paid</option><option value="demo-ticketless">Demo Mall Premium — Ticketless paid</option></select></div><div id="banner" class="banner"></div><div class="section card lab"><label><div><b>Prototype lab</b><div style="font-size:12px;color:#667085;margin-top:3px">Test mixed free and paid parking zones.</div></div><span>Internal</span></label></div><div class="section"><h2>Popular</h2><div id="popular" class="results"></div></div></section><section id="routeView" class="routeView"><div class="card"><div class="routeHead"><div><small id="from">From current position</small><h2 id="title" style="margin:6px 0 0">Route</h2></div><button id="cancel" class="btn outline">Cancel</button></div><div class="metrics"><span id="distance">120 m</span><span id="time">2 min walk</span></div><div id="choice" class="choice"><b id="paymentHeading">Parking payment required</b><div id="paymentText" style="font-size:13px;color:#667085;margin-top:4px"></div><button id="payFirst" class="btn blue">Pay first, then car</button><button id="directCar" class="btn outline">Direct to car</button></div></div><div class="map"><svg viewBox="0 0 400 320"><path class="road" d="M35 205 C95 205 120 175 170 182 C225 190 265 205 325 180 C350 170 365 180 380 195"/><path class="road" d="M170 182 C165 225 185 270 220 300"/><path id="routeBase" class="routeBase" d="M35 205 C95 205 120 175 170 182 C225 190 265 205 325 180"/><path id="routeFlow" class="flow" d="M35 205 C95 205 120 175 170 182 C225 190 265 205 325 180"/><circle class="dot" cx="35" cy="205" r="10"/><circle id="payDot" class="stop" cx="235" cy="193" r="10" style="display:none"/><circle class="dest" cx="325" cy="180" r="10"/></svg></div><div id="steps" class="steps"></div></section></main><nav class="bottom"><button class="active"><b>⌂</b>Home</button><button><b>🗺️</b>Map</button><button><b>★</b>Saved</button><button><b>◎</b>Facilities</button></nav></div><script>(()=>{const $=id=>document.getElementById(id);const zones={"vaal-east":{name:"Vaal Mall East",type:"free",paymentMode:"free",payStation:null},"demo-free":{name:"Demo Mall Open Parking",type:"free",paymentMode:"free",payStation:null},"demo-paid":{name:"Demo Mall Basement",type:"paid",paymentMode:"pay-before-exit",payStation:{name:"Basement pay station",methods:"Card, cash and contactless"}},"demo-ticketless":{name:"Demo Mall Premium",type:"paid",paymentMode:"ticketless",payStation:null}};const destinations=[{name:"Woolworths",floor:"Ground floor",dist:78,time:"1 min",icon:"W"},{name:"Clicks",floor:"Ground floor",dist:95,time:"2 min",icon:"C"},{name:"John Dory's",floor:"Upper retail deck",dist:65,time:"1 min",icon:"JD"},{name:"Upper-level toilets",floor:"Upper retail deck",dist:70,time:"1 min",icon:"WC"}];let current="PEP entrance";let savedParking=loadParking();function loadParking(){try{return JSON.parse(localStorage.getItem("mallFinderSavedParking"))}catch{return null}}function saveParkingState(value){savedParking=value;try{localStorage.setItem("mallFinderSavedParking",JSON.stringify(value))}catch{}}function selectedZone(){return zones[$("parkingZone").value]}function updateZoneBadge(){const z=selectedZone();$("parkingType").textContent=z.type==="free"?"🅿 Free parking zone":z.paymentMode==="ticketless"?"📷 Ticketless paid zone":"🎟 Paid parking zone"}function drawList(){$("popular").innerHTML=destinations.map(d=>`<div class="result"><div class="badge">${d.icon}</div><div class="meta"><h3>${d.name}</h3><p>${d.floor} · ${d.time}</p></div><button class="btn yellow" data-go="${d.name}">View</button></div>`).join("");document.querySelectorAll("[data-go]").forEach(b=>b.addEventListener("click",()=>navigate(destinations.find(d=>d.name===b.dataset.go),false,false)))}function showBanner(text){$("banner").style.display="block";$("banner").textContent=text}function showRoute(){$("home").style.display="none";$("routeView").style.display="block";window.scrollTo({top:0,behavior:"smooth"})}function navigate(d,isCar,viaPay){showRoute();$("title").textContent=d.name;$("from").textContent=`From ${current}`;$("distance").textContent=`${d.dist||120} m`;$("time").textContent=`${d.time||"2 min"} walk`;const zone=isCar&&savedParking?zones[savedParking.zoneId]:null;const needsChoice=Boolean(isCar&&zone&&zone.type==="paid"&&zone.paymentMode==="pay-before-exit"&&!viaPay);$("choice").style.display=needsChoice?"block":"none";$("payDot").style.display=viaPay?"block":"none";if(needsChoice){$("paymentHeading").textContent="Parking payment required";$("paymentText").textContent=`Your car is in ${zone.name}. Stop at ${zone.payStation.name} before returning to the vehicle.`}let stepText;if(viaPay&&zone){stepText=[`Start from ${current}`,`Go to ${zone.payStation.name}`,"Pay parking fee",`Continue to your car in ${zone.name}`]}else if(isCar&&zone&&zone.paymentMode==="ticketless"){stepText=[`Start from ${current}`,`Return to your car in ${zone.name}`,"Parking will be charged automatically at exit"]}else if(isCar&&zone){stepText=[`Start from ${current}`,`Return to your car in ${zone.name}`]}else{stepText=[`Start from ${current}`,d.floor==="Upper retail deck"?"Continue to upper retail level":"Follow the main corridor",`Arrive at ${d.name}`]}$("steps").innerHTML=stepText.map((t,i)=>`<div class="step"><span>${i+1}</span><div>${t}</div></div>`).join("")}$("parkingZone").addEventListener("change",updateZoneBadge);$("parkBtn").addEventListener("click",()=>{const zoneId=$("parkingZone").value;const zone=zones[zoneId];saveParkingState({name:"My parked car",zoneId,zoneName:zone.name,access:current,savedAt:new Date().toISOString()});showBanner(`Parking saved in ${zone.name} (${zone.type==="free"?"free":"paid"} zone).`)});$("carBtn").addEventListener("click",()=>{savedParking=loadParking();if(!savedParking||!zones[savedParking.zoneId]){showBanner("No parking location saved yet. Choose a parking zone and tap Save parking first.");return}const zone=zones[savedParking.zoneId];if(zone.type==="paid"&&zone.paymentMode==="pay-before-exit"){navigate({name:"Return to my car",floor:"Parking",dist:120,time:"2 min"},true,false)}else{navigate({name:"My parked car",floor:"Parking",dist:120,time:"2 min"},true,false)}});$("payFirst").addEventListener("click",()=>navigate({name:"My parked car",floor:"Parking",dist:165,time:"3 min"},true,true));$("directCar").addEventListener("click",()=>navigate({name:"My parked car",floor:"Parking",dist:120,time:"2 min"},true,false));$("cancel").addEventListener("click",()=>{$("routeView").style.display="none";$("home").style.display="block"});$("search").addEventListener("input",e=>{const q=e.target.value.toLowerCase();document.querySelectorAll(".result").forEach(r=>r.style.display=r.textContent.toLowerCase().includes(q)?"flex":"none")});updateZoneBadge();drawList();if(savedParking&&zones[savedParking.zoneId])showBanner(`Saved car: ${zones[savedParking.zoneId].name}.`)})();</script></body></html>
