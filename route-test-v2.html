<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Route Test V2</title><style>body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:0;background:#f4f6fa;color:#111827}.wrap{max-width:700px;margin:auto;padding:16px}h1{font-size:22px}.version{background:#111827;color:#fff;padding:8px 10px;border-radius:10px;display:inline-block;margin-bottom:12px}.buttons{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}button{padding:13px;border-radius:12px;border:1px solid #dfe3ea;background:#fff;font-weight:800}.on{background:#ffe100;border-color:#ffe100}.map{position:relative;background:#fff;border:1px solid #dfe3ea;border-radius:16px;overflow:hidden}.map img{display:block;width:100%;height:auto}.map svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}.route{fill:none;stroke:#ef4444;stroke-width:13;stroke-linecap:round;stroke-linejoin:round}.start{fill:#12b76a;stroke:#fff;stroke-width:5}.end{fill:#ffe100;stroke:#111827;stroke-width:5}.note{background:#fff;border:1px solid #dfe3ea;border-radius:14px;padding:14px;margin-top:12px}</style></head><body><div class="wrap"><h1>Vaal Mall route test</h1><div class="version">Version 2 — cache-free test</div><div class="buttons"><button data-key="west">West / Banking Court</button><button data-key="south">South / Main</button><button data-key="east" class="on">East / Woolworths side</button><button data-key="north">North entrance</button></div><div class="map"><img src="https://vaalmallshopping.co.za/wp-content/uploads/2026/04/Vaal-Mall-Mall-Map-File_page-0001.jpg" alt="Vaal Mall map"><svg id="svg" viewBox="0 0 1400 850" preserveAspectRatio="none"></svg></div><div class="note" id="note">Selected: East / Woolworths side</div></div><script>const routes={west:[[150,500],[350,500],[550,480],[720,470],[920,500],[1110,555]],south:[[690,820],[690,660],[720,470],[920,500],[1110,555]],east:[[1260,640],[1190,600],[1110,555]],north:[[730,80],[730,250],[720,470],[920,500],[1110,555]]};const labels={west:'West / Banking Court',south:'South / Main',east:'East / Woolworths side',north:'North entrance'};const svg=document.getElementById('svg'),note=document.getElementById('note'),buttons=[...document.querySelectorAll('button[data-key]')];function draw(key){const p=routes[key],s=p[0],e=p[p.length-1];svg.innerHTML='<polyline class="route" points="'+p.map(v=>v.join(',')).join(' ')+'"></polyline><circle class="start" cx="'+s[0]+'" cy="'+s[1]+'" r="18"></circle><circle class="end" cx="'+e[0]+'" cy="'+e[1]+'" r="18"></circle>';note.textContent='Selected: '+labels[key];buttons.forEach(b=>b.classList.toggle('on',b.dataset.key===key))}buttons.forEach(b=>{b.onclick=function(){draw(this.dataset.key)}});draw('east');</script></body></html>
