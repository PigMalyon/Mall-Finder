<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Mall Finder Preview V2</title><style>:root{--b:#0757b8;--y:#ffe100;--bg:#f4f6fa;--ink:#111827;--m:#667085;--line:#dfe3ea}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--ink)}button,input{font:inherit}.app{max-width:720px;margin:auto;padding-bottom:30px}.hero{background:linear-gradient(145deg,#0757b8,#043b7b);color:#fff;padding:24px 18px;border-radius:0 0 28px 28px}.hero h1{margin:18px 0 8px;font-size:34px}.search{display:flex;gap:8px}.search input{flex:1;border:0;border-radius:14px;padding:14px}.search button{border:0;border-radius:14px;background:var(--y);padding:0 18px;font-weight:900}.content{padding:16px}.toolbar{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px}.tabs,.entrances,.floors{display:flex;gap:8px;overflow:auto}.tab,.entrance,.floor,.clear{border:1px solid var(--line);background:#fff;border-radius:999px;padding:9px 12px;font-weight:800;white-space:nowrap}.on{background:var(--y);border-color:var(--y)}.status,.card,.product,.mapbox,.note{background:#fff;border:1px solid var(--line);border-radius:18px}.status,.note{padding:14px;margin-bottom:12px}.list{display:grid;gap:10px}.card,.product{padding:13px}.card{display:flex;align-items:center;gap:12px}.icon{width:46px;height:46px;border-radius:14px;background:#eef4fb;display:grid;place-items:center;font-size:22px}.main{flex:1}.main b{display:block}.muted{color:var(--m);font-size:13px}.routebtn{border:0;background:var(--b);color:#fff;border-radius:12px;padding:10px 12px;font-weight:900}.price{font-size:24px;font-weight:950;color:var(--b)}.productTop{display:flex;justify-content:space-between;gap:12px}.stock{display:inline-block;margin-top:6px;padding:5px 8px;border-radius:999px;font-size:12px;font-weight:900;background:#dcfae6;color:#067647}.mapbox{padding:12px;margin-top:14px}.map{position:relative;overflow:hidden;border-radius:14px}.map img{display:block;width:100%}.map svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}.route{fill:none;stroke:#ef4444;stroke-width:12;stroke-linecap:round;stroke-linejoin:round}.start{fill:#12b76a;stroke:#fff;stroke-width:5}.end{fill:var(--y);stroke:#111827;stroke-width:5}.upper{display:none;grid-template-columns:1fr 1fr;gap:10px}.upper.show{display:grid}.unit{min-height:110px;border:2px solid #222;border-radius:14px;background:#fff;display:grid;place-items:center;text-align:center;font-weight:900;padding:10px}.unit.selected{background:var(--y)}.footer{text-align:center;color:var(--m);font-size:12px;margin:18px 0}</style></head><body><div class="app"><div class="hero"><b>🛍️ Mall Finder · Vaal Mall</b><h1>Find it. Get there faster.</h1><div class="search"><input id="q" placeholder="Try Woolworths, shoes, Grubhouse"><button id="searchBtn">Search</button></div></div><div class="content"><div class="toolbar"><div class="tabs"><button class="tab on" data-mode="all">All</button><button class="tab" data-mode="stores">Stores</button><button class="tab" data-mode="products">Products</button></div><button class="clear" id="clear">Clear</button></div><div class="status" id="status"><b>Friends & Family Preview V2</b><div class="muted">Destination-aware routing and selectable upper level.</div></div><div class="list" id="results"></div><div class="mapbox"><div class="floors"><button class="floor on" data-floor="ground">Ground floor</button><button class="floor" data-floor="upper">Upper level</button></div><div class="entrances" id="entrances"><button class="entrance" data-key="west">West / Banking Court</button><button class="entrance" data-key="south">South / Main</button><button class="entrance on" data-key="east">East / Woolworths side</button><button class="entrance" data-key="north">North entrance</button></div><div class="map" id="ground"><img src="https://vaalmallshopping.co.za/wp-content/uploads/2026/04/Vaal-Mall-Mall-Map-File_page-0001.jpg" alt="Official Vaal Mall map"><svg id="svg" viewBox="0 0 1400 850" preserveAspectRatio="none"></svg></div><div class="upper" id="upper"><button class="unit" data-upper="Ster-Kinekor">Ster-Kinekor</button><button class="unit" data-upper="John Dory’s">John Dory’s</button><button class="unit" data-upper="Grubhouse">Grubhouse</button><button class="unit" data-upper="Gold Rush">Gold Rush</button><button class="unit" data-upper="Stairs / escalator">Stairs / escalator</button><button class="unit" data-upper="Upper-level toilets">Upper-level toilets</button></div></div><div class="note" id="note"><b>Route to Woolworths</b><div class="muted">Selected: East / Woolworths side</div></div><div class="footer">Sample product prices and stock are demonstrative only.</div></div></div><script>const stores=[{n:'Woolworths',c:'Department Store',i:'🛍️',floor:'ground',x:1110,y:555},{n:'Edgars',c:'Department Store',i:'🛍️',floor:'ground',x:210,y:280},{n:'Pick n Pay',c:'Department Store',i:'🛒',floor:'ground',x:1010,y:300},{n:'Dis-Chem',c:'Health & Beauty',i:'💊',floor:'ground',x:420,y:610},{n:'Clicks',c:'Health & Beauty',i:'💊',floor:'ground',x:930,y:155},{n:'Mr Price Sport',c:'Sports',i:'👟',floor:'ground',x:560,y:625},{n:'Footgear',c:'Footwear',i:'👟',floor:'ground',x:535,y:560},{n:'Grubhouse',c:'Restaurant · Upper level',i:'🍽️',floor:'upper'},{n:'Ster-Kinekor',c:'Entertainment · Upper level',i:'🎬',floor:'upper'},{n:'John Dory’s',c:'Restaurant · Upper level',i:'🍽️',floor:'upper'},{n:'Gold Rush',c:'Entertainment · Upper level',i:'🎰',floor:'upper'},{n:'KFC',c:'Outside the mall',i:'🍗',floor:'ground',x:940,y:760},{n:'McDonald’s',c:'Outside the mall',i:'🍔',floor:'ground',x:1120,y:760},{n:'Econofoods',c:'Outside the mall',i:'🛒',floor:'ground',x:1280,y:740}];const products=[{n:"Levi's 511 Slim Jeans",s:'Woolworths',p:899,t:['levi','jeans','clothing']},{n:"Levi's 511 Slim Jeans",s:'Edgars',p:949,t:['levi','jeans','clothing']},{n:'Ladies black court shoe',s:'Footgear',p:499,t:['shoe','shoes','footwear']},{n:'Everyday sneaker',s:'Mr Price Sport',p:699,t:['shoe','shoes','sneaker','footwear']},{n:'Adidas Runfalcon 5',s:'Mr Price Sport',p:1399,t:['shoe','shoes','running','footwear']}];let mode='all',selectedEntrance='east',destination=stores[0],currentFloor='ground';const starts={west:[150,500],south:[690,820],east:[1260,640],north:[730,80]};const labels={west:'West / Banking Court',south:'South / Main',east:'East / Woolworths side',north:'North entrance'};const hubs={west:[[310,500],[470,485],[620,470]],south:[[690,680],[690,560],[690,470]],east:[[1200,610],[1160,585]],north:[[730,220],[720,340],[700,430]]};const $=id=>document.getElementById(id),results=$('results'),q=$('q'),svg=$('svg'),note=$('note');function setFloor(f){currentFloor=f;document.querySelectorAll('.floor').forEach(x=>x.classList.toggle('on',x.dataset.floor===f));$('ground').style.display=f==='ground'?'block':'none';$('upper').classList.toggle('show',f==='upper')}function drawRoute(){if(destination.floor==='upper'){setFloor('upper');document.querySelectorAll('.unit').forEach(x=>x.classList.toggle('selected',x.dataset.upper===destination.n));note.innerHTML='<b>Route to '+destination.n+'</b><div class="muted">Start from '+labels[selectedEntrance]+', follow the ground-floor corridor to the stairs/escalator, then continue on the upper level.</div>';return}setFloor('ground');const s=starts[selectedEntrance],via=hubs[selectedEntrance],d=[destination.x,destination.y],p=[s,...via,d];svg.innerHTML='<polyline class="route" points="'+p.map(v=>v.join(',')).join(' ')+'"></polyline><circle class="start" cx="'+s[0]+'" cy="'+s[1]+'" r="18"></circle><circle class="end" cx="'+d[0]+'" cy="'+d[1]+'" r="18"></circle>';note.innerHTML='<b>Route to '+destination.n+'</b><div class="muted">Selected: '+labels[selectedEntrance]+'.</div>'}function search(){const t=q.value.trim().toLowerCase();const ss=stores.filter(x=>!t||(x.n+' '+x.c).toLowerCase().includes(t));const ps=products.filter(x=>!t||(x.n+' '+x.s+' '+x.t.join(' ')).toLowerCase().includes(t));let h='';if(mode!=='products')h+=ss.map(x=>'<div class="card"><div class="icon">'+x.i+'</div><div class="main"><b>'+x.n+'</b><div class="muted">'+x.c+'</div></div><button class="routebtn" data-route="'+x.n+'">Route</button></div>').join('');if(mode!=='stores')h+=ps.map(x=>'<div class="product"><div class="productTop"><div><b>'+x.n+'</b><div class="muted">'+x.s+'</div><span class="stock">In stock</span></div><div class="price">R'+x.p+'</div></div><button class="routebtn" style="margin-top:10px" data-route="'+x.s+'">Route to store</button></div>').join('');results.innerHTML=h||'<div class="status"><b>No results</b><div class="muted">Try a broader search.</div></div>';$('status').innerHTML='<b>'+ss.length+' stores · '+ps.length+' products</b><div class="muted">Preview results</div>'}document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{mode=b.dataset.mode;document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('on',x===b));search()});$('searchBtn').onclick=search;q.oninput=search;$('clear').onclick=()=>{q.value='';mode='all';document.querySelectorAll('.tab').forEach((x,i)=>x.classList.toggle('on',i===0));destination=stores[0];search();drawRoute();window.scrollTo({top:0,behavior:'smooth'})};results.onclick=e=>{const n=e.target.dataset.route;if(n){destination=stores.find(x=>x.n===n)||stores[0];drawRoute();document.querySelector('.mapbox').scrollIntoView({behavior:'smooth'})}};document.querySelectorAll('.entrance').forEach(b=>b.onclick=()=>{selectedEntrance=b.dataset.key;document.querySelectorAll('.entrance').forEach(x=>x.classList.toggle('on',x===b));drawRoute()});document.querySelectorAll('.floor').forEach(b=>b.onclick=()=>setFloor(b.dataset.floor));document.querySelectorAll('.unit[data-upper]').forEach(b=>b.onclick=()=>{destination=stores.find(x=>x.n===b.dataset.upper)||{n:b.dataset.upper,floor:'upper'};drawRoute()});search();drawRoute();</script></body></html>
