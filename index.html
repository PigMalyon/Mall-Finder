<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#0057b8"><title>Mall Finder — Vaal Mall</title><style>:root{--b:#0057b8;--b2:#003d82;--y:#ffe500;--bg:#f3f6fa;--card:#fff;--ink:#101828;--m:#667085;--line:#e4e7ec}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--ink)}.app{max-width:480px;margin:auto;min-height:100vh;padding-bottom:28px}.hero{padding:calc(18px + env(safe-area-inset-top)) 18px 28px;background:linear-gradient(145deg,var(--b),var(--b2));color:white;border-radius:0 0 30px 30px}.top{display:flex;justify-content:space-between;align-items:center}.brand{font-weight:900;font-size:22px}.pill{font-size:12px;background:#ffffff22;border:1px solid #ffffff33;padding:8px 10px;border-radius:999px}.hero h1{font-size:32px;line-height:1.05;margin:24px 0 8px}.hero p{opacity:.85;margin:0 0 16px}.searchrow{display:flex;gap:8px}.searchrow input{flex:1;border:0;border-radius:16px;padding:14px;font-size:16px;outline:none}.searchrow button{border:0;border-radius:16px;background:var(--y);font-weight:900;padding:0 18px}.content{padding:18px 16px}.section{display:flex;justify-content:space-between;align-items:center;margin:0 2px 10px}.section h2{font-size:19px;margin:0}.section button{border:0;background:none;color:var(--b);font-weight:800}.chips{display:flex;gap:8px;overflow:auto;padding-bottom:8px}.chip{white-space:nowrap;border:1px solid var(--line);background:white;padding:9px 12px;border-radius:999px;font-weight:700}.chip.on{background:var(--y);border-color:var(--y)}.status{background:white;border:1px solid #d8e7fa;border-radius:20px;padding:14px;margin:12px 0}.status b{display:block;margin-bottom:4px}.status small{color:var(--m)}.list{display:grid;gap:10px}.card{display:flex;gap:12px;align-items:center;background:white;border:1px solid var(--line);border-radius:18px;padding:12px}.icon{width:48px;height:48px;border-radius:15px;background:#eef4fb;display:grid;place-items:center;font-size:22px}.main{flex:1}.main b{display:block;margin-bottom:4px}.main small{color:var(--m)}.go{border:0;background:var(--b);color:white;border-radius:12px;padding:10px 12px;font-weight:900}.empty{text-align:center;color:var(--m);padding:28px}.map{display:none;position:fixed;inset:0;background:var(--bg);z-index:10;overflow:auto}.map.show{display:block}.maphead{position:sticky;top:0;background:#f3f6faee;backdrop-filter:blur(14px);padding:calc(10px + env(safe-area-inset-top)) 14px 10px;display:flex;gap:10px;align-items:center;border-bottom:1px solid var(--line)}.back{width:42px;height:42px;border-radius:13px;border:1px solid var(--line);background:white;font-size:22px}.maptitle b{display:block}.maptitle small{color:var(--m)}.mapbox{margin:14px;background:white;border:1px solid var(--line);border-radius:22px;padding:8px}.mapbox svg{width:100%;height:auto;min-height:520px;background:#fafcff;border-radius:16px}.corridor{fill:none;stroke:#d8dfea;stroke-width:44;stroke-linecap:round}.core{fill:none;stroke:white;stroke-width:34;stroke-linecap:round}.route{fill:none;stroke:#ef4444;stroke-width:10;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:15 9}.entr{fill:#12b76a;stroke:white;stroke-width:4}.pin{fill:var(--b);stroke:white;stroke-width:4}.sel{fill:#f79009}.note{margin:0 14px 20px;background:white;border:1px solid var(--line);border-radius:18px;padding:14px}.note p{color:var(--m);margin:5px 0 0;line-height:1.45}.footer{text-align:center;color:var(--m);font-size:12px;margin-top:18px}</style></head><body><div class="app"><header class="hero"><div class="top"><div class="brand">🛍️ Mall Finder</div><div class="pill">Vaal Mall</div></div><h1>Find it.<br>Get there faster.</h1><p>Search stores, products or categories.</p><div class="searchrow"><input id="q" placeholder="Try Woolworths, shoes, pharmacy"><button id="searchBtn">Search</button></div></header><main class="content"><div class="section"><h2>Categories</h2><button id="clear">Clear</button></div><div class="chips" id="chips"></div><div class="status" id="status"><b>Ready</b><small>Search for a store or category.</small></div><div class="section"><h2 id="title">Popular stores</h2><button id="openMap">Open map</button></div><div class="list" id="results"></div><div class="footer">Prototype map — not yet survey-verified</div></main></div><section class="map" id="mapScreen"><div class="maphead"><button class="back" id="back">‹</button><div class="maptitle"><b>Vaal Mall route</b><small id="subtitle">Choose a destination</small></div></div><div class="mapbox"><svg id="svg" viewBox="0 0 1000 660"></svg></div><div class="note" id="note"><b>Route preview</b><p>Select a store first.</p></div></section><script>const stores=[['Woolworths','Department Store','101',760,445,'e2',['clothing','food','shoes']],['Dis-Chem','Health & Beauty','67',455,240,'c2',['pharmacy','medicine','toiletries']],['Pick n Pay','Department Store','133',605,150,'m2',['groceries','food']],['Game','Department Store','75A',510,280,'c2',['electronics','toys']],['Cotton On','Clothing','145',805,235,'food',['fashion','clothes']],['Clicks','Health & Beauty','113',875,405,'e3',['pharmacy','beauty']],['Adidas','Footwear','37',235,285,'w3',['shoes','sneakers']],['Shoe City','Footwear','44',305,220,'w4',['shoes']],['Sportscene','Footwear','146',835,275,'food',['shoes','sneakers']],['Rage','Footwear','166',795,135,'m3',['shoes']],['Tekkie Town','Footwear','Pad 4',515,560,'c3',['shoes','sneakers']],['FNB','Bank','120',735,350,'food',['bank','atm']],['ABSA','Bank','121',705,310,'food',['bank','atm']],['KFC','Food','Pad 1',420,570,'c3',['chicken','takeaway']],['Mugg & Bean','Food','127',540,180,'m1',['coffee','restaurant']],['Ster-Kinekor','Entertainment','SU1',890,100,'m3',['movies','cinema']]].map(([name,category,shop,x,y,node,keywords])=>({name,category,shop,x,y,node,keywords}));const nodes={w1:[110,525],w2:[150,420],w3:[170,310],w4:[210,210],c1:[330,190],c2:[435,250],c3:[510,355],c4:[545,465],e1:[680,470],e2:[820,480],e3:[900,420],m1:[510,185],m2:[625,145],m3:[750,190],food:[825,305]};const edges=[['w1','w2'],['w2','w3'],['w3','w4'],['w4','c1'],['c1','c2'],['c2','c3'],['c3','c4'],['c4','e1'],['e1','e2'],['e2','e3'],['c2','m1'],['m1','m2'],['m2','m3'],['m3','food'],['food','e3'],['c3','food']];const entrances=[{name:'Helena Lochner Street entrance',x:95,y:545,node:'w1'},{name:'Barrage Road entrance',x:450,y:620,node:'c3'},{name:'Rossini Boulevard entrance',x:910,y:495,node:'e2'},{name:'Banking Court entrance',x:150,y:130,node:'w3'}];const icons={'Department Store':'🛒','Health & Beauty':'💊','Clothing':'👕','Footwear':'👟','Bank':'🏦','Food':'🍔','Entertainment':'🎬'};let selected=null,active='All';const $=id=>document.getElementById(id),q=$('q'),chips=$('chips'),results=$('results'),status=$('status'),title=$('title'),mapScreen=$('mapScreen'),svg=$('svg');const cats=['All','Department Store','Footwear','Health & Beauty','Food','Bank','Clothing'];function d(a,b){const A=nodes[a],B=nodes[b];return Math.hypot(A[0]-B[0],A[1]-B[1])}function shortest(start,end){const queue=[start],prev={},dist={};Object.keys(nodes).forEach(n=>dist[n]=Infinity);dist[start]=0;while(queue.length){queue.sort((a,b)=>dist[a]-dist[b]);const n=queue.shift();if(n===end)break;for(const e of edges.filter(e=>e.includes(n))){const nb=e[0]===n?e[1]:e[0],nd=dist[n]+d(n,nb);if(nd<dist[nb]){dist[nb]=nd;prev[nb]=n;if(!queue.includes(nb))queue.push(nb)}}}const p=[];for(let cur=end;cur;cur=prev[cur])p.unshift(cur);return p[0]===start?p:[]}function nearest(s){let best;for(const e of entrances){const path=shortest(e.node,s.node);const distance=path.reduce((sum,n,i)=>i?sum+d(path[i-1],n):0,0);if(!best||distance<best.distance)best={...e,path,distance}}return best}function renderChips(){chips.innerHTML=cats.map(c=>`<button class="chip ${active===c?'on':''}" data-cat="${c}">${c}</button>`).join('')}function matches(s,term){if(active!=='All'&&s.category!==active)return false;if(!term)return true;return [s.name,s.category,s.shop,...s.keywords].join(' ').toLowerCase().includes(term.toLowerCase())}function runSearch(){const term=q.value.trim();let list=stores.filter(s=>matches(s,term));title.textContent=(term||active!=='All')?`${list.length} result${list.length===1?'':'s'}`:'Popular stores';if(!term&&active==='All')list=stores.slice(0,6);results.innerHTML=list.length?list.map(s=>`<article class="card"><div class="icon">${icons[s.category]||'🏬'}</div><div class="main"><b>${s.name}</b><small>${s.category} · Shop ${s.shop}</small></div><button class="go" data-name="${s.name}">Route</button></article>`).join(''):'<div class="empty">No matching stores found.</div>';status.innerHTML=`<b>Search active</b><small>${list.length} matching store${list.length===1?'':'s'} shown.</small>`}function draw(){const corridor='M110 525 C130 455 145 390 170 310 C185 250 230 200 330 190 C390 192 430 225 435 250 C465 300 500 330 510 355 C520 405 530 445 545 465 C610 475 730 480 820 480 C865 470 900 440 900 420 M435 250 C475 215 490 190 510 185 C560 160 590 140 625 145 C680 150 710 170 750 190 C795 220 825 260 825 305 C840 350 875 390 900 420 M510 355 C610 340 720 320 825 305';let h=`<path class="corridor" d="${corridor}"/><path class="core" d="${corridor}"/>`;if(selected){const e=nearest(selected),pts=e.path.map(n=>nodes[n].join(',')).join(' ');h+=`<polyline class="route" points="${pts} ${selected.x},${selected.y}"/>`;const mins=Math.max(1,Math.round(e.distance/90));$('subtitle').textContent=`${e.name} → ${selected.name}`;$('note').innerHTML=`<b>Walk to ${selected.name}</b><p>Use ${e.name}. Follow the red route to Shop ${selected.shop}. Approx. ${mins} minute${mins===1?'':'s'}.</p>`}for(const e of entrances)h+=`<circle class="entr" cx="${e.x}" cy="${e.y}" r="11"/>`;for(const s of stores)h+=`<circle class="pin ${selected&&selected.name===s.name?'sel':''}" cx="${s.x}" cy="${s.y}" r="${selected&&selected.name===s.name?12:7}"/>`;svg.innerHTML=h}function select(name){selected=stores.find(s=>s.name===name);status.innerHTML=`<b>${selected.name}</b><small>Route selected. Open the map to view directions.</small>`;draw();mapScreen.classList.add('show')}chips.addEventListener('click',e=>{if(e.target.dataset.cat){active=e.target.dataset.cat;renderChips();runSearch()}});$('searchBtn').onclick=runSearch;q.addEventListener('input',runSearch);q.addEventListener('keydown',e=>{if(e.key==='Enter')runSearch()});$('clear').onclick=()=>{q.value='';active='All';selected=null;renderChips();runSearch()};results.addEventListener('click',e=>{const n=e.target.dataset.name;if(n)select(n)});$('openMap').onclick=()=>{draw();mapScreen.classList.add('show')};$('back').onclick=()=>mapScreen.classList.remove('show');renderChips();runSearch();draw();</script></body></html>
