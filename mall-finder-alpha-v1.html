<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Mall Finder Alpha</title><style>:root{--blue:#0b6df2;--yellow:#ffe100;--ink:#101828;--muted:#667085;--bg:#f3f6fb;--card:#fff;--green:#12b76a;--red:#f04438;--nav:#101828}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink)}.app{max-width:430px;margin:auto;min-height:100vh;background:#f8fafc;position:relative;padding-bottom:84px}.top{background:linear-gradient(135deg,#0b6df2,#174ea6);color:#fff;padding:20px 18px 26px;border-radius:0 0 26px 26px}.brand{display:flex;align-items:center;justify-content:space-between}.brand h1{font-size:24px;margin:0}.mall{font-size:13px;opacity:.9;margin-top:4px}.avatar{width:38px;height:38px;border-radius:50%;background:#ffffff22;display:grid;place-items:center}.search{margin:18px 0 0;position:relative}.search input{width:100%;border:0;border-radius:16px;padding:15px 44px 15px 44px;font-size:16px;outline:0}.search .icon{position:absolute;left:15px;top:13px}.clear{position:absolute;right:12px;top:10px;border:0;background:#eef2f6;border-radius:50%;width:30px;height:30px;display:none}.content{padding:16px}.quick{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:-6px}.quick button{border:0;border-radius:18px;padding:16px;text-align:left;background:#fff;box-shadow:0 8px 24px #10182812}.quick b{display:block;margin-top:8px}.section{margin-top:20px}.section h2{font-size:17px;margin:0 0 10px}.chips{display:flex;gap:8px;overflow:auto;padding-bottom:4px}.chip{border:1px solid #d0d5dd;background:#fff;border-radius:999px;padding:9px 13px;white-space:nowrap;font-weight:700}.results{display:grid;gap:10px}.result{background:#fff;border:1px solid #e4e7ec;border-radius:18px;padding:14px;display:flex;gap:12px;align-items:center}.result .badge{width:44px;height:44px;border-radius:14px;background:#eef4ff;display:grid;place-items:center;font-weight:900;color:var(--blue)}.result .meta{flex:1}.result h3{font-size:15px;margin:0 0 3px}.result p{font-size:12px;color:var(--muted);margin:0}.result button{border:0;background:var(--yellow);font-weight:900;border-radius:12px;padding:10px 12px}.card{background:#fff;border:1px solid #e4e7ec;border-radius:20px;padding:16px}.recommend{display:none}.recommend .hero{display:flex;justify-content:space-between;gap:12px;align-items:start}.recommend h2{margin:0;font-size:21px}.recommend .best{background:#ecfdf3;color:#027a48;border-radius:999px;padding:7px 10px;font-size:12px;font-weight:900}.metrics{display:flex;gap:18px;margin:14px 0;color:var(--muted);font-size:13px}.primary{width:100%;border:0;background:var(--blue);color:#fff;font-weight:900;border-radius:14px;padding:14px}.secondary{width:100%;border:1px solid #d0d5dd;background:#fff;color:var(--ink);font-weight:900;border-radius:14px;padding:13px;margin-top:8px}.navview{display:none}.map{background:#101820;border-radius:20px;min-height:340px;position:relative;overflow:hidden}.map svg{width:100%;height:100%;min-height:340px}.road{stroke:#fff;stroke-width:14;stroke-linecap:round}.route{stroke:var(--red);stroke-width:10;fill:none;stroke-linecap:round;stroke-linejoin:round}.flow{stroke:#ffd0d0;stroke-width:4;fill:none;stroke-linecap:round;stroke-dasharray:18 28;animation:flow 1s linear infinite}.dot{fill:#3b82f6;stroke:#fff;stroke-width:4}.dest{fill:var(--yellow);stroke:#111;stroke-width:4}.steps{margin-top:12px;display:grid;gap:8px}.step{background:#fff;border:1px solid #e4e7ec;border-radius:14px;padding:12px;display:flex;gap:10px}.step span{width:28px;height:28px;border-radius:50%;background:#eef4ff;display:grid;place-items:center;font-weight:900;color:var(--blue)}.bottom{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:min(430px,100%);background:#fff;border-top:1px solid #e4e7ec;display:grid;grid-template-columns:repeat(4,1fr);padding:9px 6px 12px}.bottom button{border:0;background:none;color:#667085;font-size:12px}.bottom button.active{color:var(--blue);font-weight:900}.bottom b{display:block;font-size:19px;margin-bottom:3px}.parkingBanner{display:none;background:#fff7d6;border:1px solid #f5d90a;border-radius:16px;padding:12px;margin-top:12px;font-size:13px}.hidden{display:none!important}@keyframes flow{to{stroke-dashoffset:-46}}@media(prefers-reduced-motion:reduce){.flow{animation:none}}</style></head><body><div class="app"><header class="top"><div class="brand"><div><h1>Mall Finder</h1><div class="mall">📍 Vaal Mall</div></div><div class="avatar">DM</div></div><div class="search"><span class="icon">🔎</span><input id="search" placeholder="Search stores, food or facilities"><button id="clear" class="clear">×</button></div></header><main class="content"><section id="home"><div class="quick"><button id="parkBtn">🅿️<b>Save parking</b><small>Remember where you entered</small></button><button id="carBtn">🚗<b>Return to my car</b><small>Route back to saved parking</small></button></div><div id="parkingBanner" class="parkingBanner"></div><div class="section"><h2>Browse</h2><div class="chips"><button class="chip" data-q="coffee">Coffee</button><button class="chip" data-q="toilets">Toilets</button><button class="chip" data-q="food">Food</button><button class="chip" data-q="pharmacy">Pharmacy</button><button class="chip" data-q="movies">Movies</button></div></div><div class="section"><h2>Popular</h2><div id="popular" class="results"></div></div><div id="recommend" class="recommend section card"></div></section><section id="navview" class="navview"><div class="card"><div class="hero"><div><small id="navFrom">From current position</small><h2 id="navTitle">Route</h2></div><button id="cancel" class="chip">Cancel</button></div><div class="metrics"><span id="navDist">185 m</span><span id="navTime">3 min walk</span></div></div><div class="map"><svg viewBox="0 0 400 340"><path class="road" d="M35 210 C90 210 115 180 160 185 C210 190 245 205 300 185 C335 172 360 180 378 200"/><path class="road" d="M150 185 C145 235 165 275 205 305"/><path id="routeBase" class="route" d="M35 210 C90 210 115 180 160 185 C210 190 245 205 300 185"/><path id="routeFlow" class="flow" d="M35 210 C90 210 115 180 160 185 C210 190 245 205 300 185"/><circle id="youDot" class="dot" cx="35" cy="210" r="10"/><circle id="destDot" class="dest" cx="300" cy="185" r="10"/></svg></div><div id="steps" class="steps"></div></section></main><nav class="bottom"><button class="active" data-tab="home"><b>⌂</b>Home</button><button data-tab="map"><b>🗺️</b>Map</button><button data-tab="saved"><b>★</b>Saved</button><button data-tab="facilities"><b>◎</b>Facilities</button></nav></div><script>const destinations=[{name:'Woolworths',cat:'department store fashion food',floor:'Ground floor',entrance:'Pick n Pay entrance',dist:78,time:'1 min',icon:'W'},{name:'Clicks',cat:'pharmacy health beauty',floor:'Ground floor',entrance:'Banking precinct entrance',dist:95,time:'2 min',icon:'C'},{name:'John Dory\'s',cat:'food restaurant sushi',floor:'Upper retail deck',entrance:'Roof parking upper retail entrance',dist:65,time:'1 min',icon:'JD'},{name:'Ster-Kinekor',cat:'movies cinema entertainment',floor:'Upper retail deck',entrance:'Roof parking upper retail entrance',dist:82,time:'2 min',icon:'SK'},{name:'Grubhouse',cat:'food restaurant burger',floor:'Upper retail deck',entrance:'Roof parking upper retail entrance',dist:88,time:'2 min',icon:'G'},{name:'Upper-level toilets',cat:'toilets facility bathroom',floor:'Upper retail deck',entrance:'Roof parking upper retail entrance',dist:70,time:'1 min',icon:'WC'},{name:'Edgars',cat:'fashion department store',floor:'Ground floor',entrance:'PEP entrance',dist:62,time:'1 min',icon:'E'},{name:'Pick n Pay',cat:'food grocery supermarket',floor:'Ground floor',entrance:'Pick n Pay entrance',dist:35,time:'1 min',icon:'PnP'}];let savedParking=null,current='PEP entrance';const $=id=>document.getElementById(id);function card(d){return `<div class="result"><div class="badge">${d.icon}</div><div class="meta"><h3>${d.name}</h3><p>${d.floor} · ${d.time} from best entrance</p></div><button data-go="${d.name}">View</button></div>`}function showList(list){$('popular').innerHTML=list.map(card).join('');document.querySelectorAll('[data-go]').forEach(b=>b.onclick=()=>recommend(destinations.find(d=>d.name===b.dataset.go)))}function recommend(d){$('recommend').style.display='block';$('recommend').innerHTML=`<div class="hero"><div><small>${d.floor}</small><h2>${d.name}</h2></div><span class="best">Best entrance</span></div><div class="metrics"><span>🚪 ${d.entrance}</span><span>🚶 ${d.time}</span><span>📏 ${d.dist} m</span></div><button class="primary" id="startNav">Navigate</button><button class="secondary" id="saveDest">Save destination</button>`;$('startNav').onclick=()=>navigate(d);$('recommend').scrollIntoView({behavior:'smooth',block:'center'})}function navigate(d){$('home').classList.add('hidden');$('navview').style.display='block';$('navTitle').textContent=d.name;$('navFrom').textContent=`From ${current}`;$('navDist').textContent=`${d.dist} m`;$('navTime').textContent=`${d.time} walk`;$('steps').innerHTML=[`Start at ${current}`,d.floor==='Upper retail deck'?'Continue to upper retail level':'Follow the main corridor',`Arrive at ${d.name}`].map((t,i)=>`<div class="step"><span>${i+1}</span><div>${t}</div></div>`).join('');window.scrollTo({top:0,behavior:'smooth'})}$('cancel').onclick=()=>{$('navview').style.display='none';$('home').classList.remove('hidden')};$('parkBtn').onclick=()=>{savedParking=current;$('parkingBanner').style.display='block';$('parkingBanner').textContent=`Parking saved near ${savedParking}. You can now route back here later.`};$('carBtn').onclick=()=>{if(!savedParking){$('parkingBanner').style.display='block';$('parkingBanner').textContent='No parking location saved yet. Tap Save parking when you arrive.';return}navigate({name:'My parked car',floor:'Parking access',entrance:savedParking,dist:120,time:'2 min'})};$('search').oninput=e=>{const q=e.target.value.trim().toLowerCase();$('clear').style.display=q?'block':'none';if(!q){showList(destinations.slice(0,4));return}const list=destinations.filter(d=>(d.name+' '+d.cat).toLowerCase().includes(q));showList(list);$('recommend').style.display='none'};$('clear').onclick=()=>{$('search').value='';$('clear').style.display='none';showList(destinations.slice(0,4));$('recommend').style.display='none'};document.querySelectorAll('[data-q]').forEach(b=>b.onclick=()=>{$('search').value=b.dataset.q;$('search').dispatchEvent(new Event('input'))});document.querySelectorAll('.bottom button').forEach(b=>b.onclick=()=>{document.querySelectorAll('.bottom button').forEach(x=>x.classList.remove('active'));b.classList.add('active');if(b.dataset.tab==='home'){$('navview').style.display='none';$('home').classList.remove('hidden')}else if(b.dataset.tab==='facilities'){$('search').value='toilets';$('search').dispatchEvent(new Event('input'));$('home').classList.remove('hidden');$('navview').style.display='none'}});showList(destinations.slice(0,4));</script></body></html>
