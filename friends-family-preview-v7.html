<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Mall Finder Preview V7</title><style>:root{--b:#0757b8;--y:#ffe100;--bg:#f4f6fa;--ink:#111827;--m:#667085;--line:#dfe3ea;--red:#ef4444}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--ink)}button,input{font:inherit}.app{max-width:720px;margin:auto}.hero{background:linear-gradient(145deg,#0757b8,#043b7b);color:#fff;padding:24px 18px;border-radius:0 0 28px 28px}.hero h1{margin:18px 0 8px;font-size:34px}.search{display:flex;gap:8px}.search input{flex:1;border:0;border-radius:14px;padding:14px}.search button{border:0;border-radius:14px;background:var(--y);padding:0 18px;font-weight:900}.content{padding:16px}.toolbar,.tabs,.sorts,.entrances,.floors{display:flex;gap:8px;overflow:auto}.toolbar{justify-content:space-between;align-items:center;margin-bottom:12px}.tab,.sort,.clear,.entrance,.floor,.back{border:1px solid var(--line);background:#fff;border-radius:999px;padding:9px 12px;font-weight:800;white-space:nowrap}.on{background:var(--y);border-color:var(--y)}.status,.card,.product,.note{background:#fff;border:1px solid var(--line);border-radius:18px}.status,.note{padding:14px;margin-bottom:12px}.list{display:grid;gap:10px}.card,.product{padding:13px}.card{display:flex;align-items:center;gap:12px}.icon{width:46px;height:46px;border-radius:14px;background:#eef4fb;display:grid;place-items:center;font-size:22px}.main{flex:1}.main b{display:block}.muted{color:var(--m);font-size:13px}.routebtn{border:0;background:var(--b);color:#fff;border-radius:12px;padding:10px 12px;font-weight:900}.price{font-size:24px;font-weight:950;color:var(--b)}.productTop{display:flex;justify-content:space-between;gap:12px}.stock{display:inline-block;margin-top:6px;padding:5px 8px;border-radius:999px;font-size:12px;font-weight:900;background:#dcfae6;color:#067647}.screen{display:none;position:fixed;inset:0;background:var(--bg);z-index:20;overflow:auto}.screen.show{display:block}.head{position:sticky;top:0;z-index:3;background:#fff;padding:12px 14px;border-bottom:1px solid var(--line);display:flex;gap:10px;align-items:center}.mapcard{padding:14px}.map{position:relative;overflow:hidden;border-radius:16px;background:#fff;border:1px solid var(--line)}.map img{display:block;width:100%;height:auto}.map svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}.route{fill:none;stroke:var(--red);stroke-width:10;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:17 10}.start{fill:#12b76a;stroke:#fff;stroke-width:5}.end{fill:var(--y);stroke:#111827;stroke-width:5}.upper{display:none;grid-template-columns:1fr 1fr;gap:10px;padding:14px}.upper.show{display:grid}.unit{min-height:110px;border:2px solid #222;border-radius:14px;background:#fff;display:grid;place-items:center;text-align:center;font-weight:900;padding:10px}.unit.selected{background:var(--y)}.footer{text-align:center;color:var(--m);font-size:12px;margin:18px 0}</style></head><body><div class="app"><div class="hero"><b>🛍️ Mall Finder · Vaal Mall</b><h1>Find it. Get there faster.</h1><div class="search"><input id="q" placeholder="Try Woolworths, shoes, Grubhouse"><button id="searchBtn">Search</button></div></div><div class="content"><div class="toolbar"><div class="tabs"><button class="tab on" data-mode="all">All</button><button class="tab" data-mode="stores">Stores</button><button class="tab" data-mode="products">Products</button></div><button class="clear" id="clear">Clear</button></div><div class="sorts" id="sorts" style="display:none;margin-bottom:12px"><button class="sort on" data-sort="relevance">Relevance</button><button class="sort" data-sort="low">Price: low</button><button class="sort" data-sort="high">Price: high</button></div><div class="status" id="status"><b>Friends & Family Preview V7</b><div class="muted">Ordered corridor routing without reverse tails.</div></div><div class="list" id="results"></div><div class="footer">Sample prices and stock are demonstrative only.</div></div></div><section class="screen" id="mapScreen"><div class="head"><button class="back" id="back">‹ Back</button><div><b id="mapTitle">Route</b><span class="muted" id="mapSub">Ground floor</span></div></div><div class="mapcard"><div class="floors" style="margin-bottom:10px"><button class="floor on" data-floor="ground">Ground floor</button><button class="floor" data-floor="upper">Upper level</button></div><div class="entrances" style="margin-bottom:10px"><button class="entrance" data-key="west">West / Banking Court</button><button class="entrance" data-key="south">South / Main entrance</button><button class="entrance on" data-key="east">East / Woolworths side</button><button class="entrance" data-key="north">North / Banking precinct</button></div><div class="map" id="ground"><img src="https://vaalmallshopping.co.za/wp-content/uploads/2026/04/Vaal-Mall-Mall-Map-File_page-0001.jpg" alt="Official Vaal Mall map"><svg id="svg" viewBox="0 0 1536 914" preserveAspectRatio="none"></svg></div><div class="upper" id="upper"><button class="unit" data-upper="sk">Ster-Kinekor</button><button class="unit" data-upper="jd">John Dory’s</button><button class="unit" data-upper="gh">Grubhouse</button><button class="unit" data-upper="gr">Gold Rush</button><button class="unit" data-upper="stairs">Stairs / escalator</button><button class="unit" data-upper="ut">Upper-level toilets</button></div><div class="note" id="note" style="margin-top:12px"></div></div></section><script>const stores=[{id:'wool',n:'Woolworths',c:'Department Store',i:'🛍️',floor:'ground',node:'wool'},{id:'edgars',n:'Edgars',c:'Department Store',i:'🛍️',floor:'ground',node:'edgars'},{id:'pnp',n:'Pick n Pay',c:'Department Store',i:'🛒',floor:'ground',node:'pnp'},{id:'dischem',n:'Dis-Chem',c:'Health & Beauty',i:'💊',floor:'ground',node:'dischem'},{id:'clicks',n:'Clicks',c:'Health & Beauty',i:'💊',floor:'ground',node:'clicks'},{id:'mrps',n:'Mr Price Sport',c:'Sports',i:'👟',floor:'ground',node:'mrps'},{id:'footgear',n:'Footgear',c:'Footwear',i:'👟',floor:'ground',node:'footgear'},{id:'gh',n:'Grubhouse',c:'Restaurant · Upper level',i:'🍽️',floor:'upper'},{id:'sk',n:'Ster-Kinekor',c:'Entertainment · Upper level',i:'🎬',floor:'upper'},{id:'jd',n:'John Dory’s',c:'Restaurant · Upper level',i:'🍽️',floor:'upper'},{id:'gr',n:'Gold Rush',c:'Entertainment · Upper level',i:'🎰',floor:'upper'},{id:'ut',n:'Upper-level toilets',c:'Facility · Upper level',i:'🚻',floor:'upper'}];const products=[{n:"Levi's 511 Slim Jeans",storeId:'wool',s:'Woolworths',p:899,t:['levi','jeans','clothing']},{n:"Levi's 511 Slim Jeans",storeId:'edgars',s:'Edgars',p:949,t:['levi','jeans','clothing']},{n:'Ladies black court shoe',storeId:'footgear',s:'Footgear',p:499,t:['shoe','shoes','footwear']},{n:'Everyday sneaker',storeId:'mrps',s:'Mr Price Sport',p:699,t:['shoe','shoes','sneaker','footwear']},{n:'Adidas Runfalcon 5',storeId:'mrps',s:'Mr Price Sport',p:1399,t:['shoe','shoes','running','footwear']}];const P={west:[125,445],m0:[205,445],m1:[250,385],edgars:[300,355],m2:[330,385],m3:[430,405],m4:[560,415],stairs:[610,420],m5:[700,420],m6:[790,420],wool:[865,430],m7:[900,390],m8:[1020,390],pnp:[1110,400],east:[1165,520],north:[1030,160],n1:[1000,235],clicks:[980,250],n2:[970,300],n3:[950,355],south:[370,815],s1:[335,720],dischem:[395,680],s2:[300,630],s3:[285,540],s4:[285,470],b1:[420,500],b2:[410,590],footgear:[545,680],f1:[555,500],f2:[550,590],mrps:[575,740],r1:[565,520],r2:[570,630]};const E=[['west','m0'],['m0','m1'],['m1','m2'],['m1','edgars'],['m2','m3'],['m3','m4'],['m4','stairs'],['stairs','m5'],['m5','m6'],['m6','wool'],['m6','m7'],['m7','m8'],['m8','pnp'],['pnp','east'],['north','n1'],['n1','n2'],['n1','clicks'],['n2','n3'],['n3','m7'],['south','s1'],['s1','s2'],['s1','dischem'],['s2','s3'],['s3','s4'],['s4','m2'],['m3','b1'],['b1','b2'],['b2','dischem'],['m4','f1'],['f1','f2'],['f2','footgear'],['footgear','mrps'],['m4','r1'],['r1','r2'],['r2','mrps']];const labels={west:'West / Banking Court',south:'South / Main entrance',east:'East / Woolworths side',north:'North / Banking precinct'};let mode='all',sort='relevance',selectedEntrance='east',selectedId='wool';const $=id=>document.getElementById(id),results=$('results'),q=$('q'),svg=$('svg'),note=$('note'),mapScreen=$('mapScreen'),sorts=$('sorts');function D(a,b){return Math.hypot(P[a][0]-P[b][0],P[a][1]-P[b][1])}function shortest(start,end){const open=[start],dist={},prev={},seen=new Set;Object.keys(P).forEach(k=>dist[k]=Infinity);dist[start]=0;while(open.length){open.sort((a,b)=>dist[a]-dist[b]);const cur=open.shift();if(seen.has(cur))continue;seen.add(cur);if(cur===end)break;for(const [a,b] of E){if(a!==cur&&b!==cur)continue;const nb=a===cur?b:a,nd=dist[cur]+D(cur,nb);if(nd<dist[nb]){dist[nb]=nd;prev[nb]=cur;open.push(nb)}}}const path=[];for(let cur=end;cur;cur=prev[cur])path.unshift(cur);return path[0]===start?path:[]}function current(){return stores.find(s=>s.id===selectedId)||stores[0]}function setFloor(f){document.querySelectorAll('.floor').forEach(x=>x.classList.toggle('on',x.dataset.floor===f));$('ground').style.display=f==='ground'?'block':'none';$('upper').classList.toggle('show',f==='upper');$('mapSub').textContent=f==='ground'?'Ground floor':'Upper level'}function draw(){const dest=current();$('mapTitle').textContent=dest.n;document.querySelectorAll('.unit').forEach(x=>x.classList.toggle('selected',x.dataset.upper===dest.id));if(dest.floor==='upper'){setFloor('upper');note.innerHTML='<b>Route to '+dest.n+'</b><div class="muted">From '+labels[selectedEntrance]+', follow the corridor route to the stairs/escalator, then continue upstairs.</div>';return}setFloor('ground');const path=shortest(selectedEntrance,dest.node),pts=path.map(k=>P[k]);svg.innerHTML='<polyline class="route" points="'+pts.map(p=>p.join(',')).join(' ')+'"></polyline><circle class="start" cx="'+pts[0][0]+'" cy="'+pts[0][1]+'" r="18"></circle><circle class="end" cx="'+pts.at(-1)[0]+'" cy="'+pts.at(-1)[1]+'" r="18"></circle>';note.innerHTML='<b>Route to '+dest.n+'</b><div class="muted">Starting from '+labels[selectedEntrance]+'. No reverse tail is added.</div>'}function render(){const t=q.value.trim().toLowerCase();let ss=stores.filter(s=>!t||(s.n+' '+s.c).toLowerCase().includes(t));let ps=products.filter(p=>!t||(p.n+' '+p.s+' '+p.t.join(' ')).toLowerCase().includes(t));if(sort==='low')ps.sort((a,b)=>a.p-b.p);if(sort==='high')ps.sort((a,b)=>b.p-a.p);sorts.style.display=mode==='products'||(mode==='all'&&t)?'flex':'none';let html='';if(mode!=='products')html+=ss.map(s=>'<div class="card" data-store="'+s.id+'"><div class="icon">'+s.i+'</div><div class="main"><b>'+s.n+'</b><div class="muted">'+s.c+'</div></div><button class="routebtn">Route</button></div>').join('');if(mode!=='stores')html+=ps.map(p=>'<div class="product" data-store="'+p.storeId+'"><div class="productTop"><div><b>'+p.n+'</b><div class="muted">'+p.s+'</div><span class="stock">In stock</span></div><div class="price">R'+p.p+'</div></div><button class="routebtn" style="margin-top:10px">Route to store</button></div>').join('');results.innerHTML=html||'<div class="status"><b>No results</b><div class="muted">Try a broader search.</div></div>';$('status').innerHTML='<b>'+ss.length+' stores · '+ps.length+' products</b><div class="muted">Preview results</div>'}results.onclick=e=>{const card=e.target.closest('[data-store]');if(!card)return;selectedId=card.dataset.store;draw();mapScreen.classList.add('show')};document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{mode=b.dataset.mode;document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('on',x===b));render()});document.querySelectorAll('.sort').forEach(b=>b.onclick=()=>{sort=b.dataset.sort;document.querySelectorAll('.sort').forEach(x=>x.classList.toggle('on',x===b));render()});$('searchBtn').onclick=render;q.oninput=render;$('clear').onclick=()=>{q.value='';mode='all';sort='relevance';selectedId='wool';document.querySelectorAll('.tab').forEach((x,i)=>x.classList.toggle('on',i===0));document.querySelectorAll('.sort').forEach((x,i)=>x.classList.toggle('on',i===0));render()};document.querySelectorAll('.entrance').forEach(b=>b.onclick=()=>{selectedEntrance=b.dataset.key;document.querySelectorAll('.entrance').forEach(x=>x.classList.toggle('on',x===b));draw()});document.querySelectorAll('.floor').forEach(b=>b.onclick=()=>setFloor(b.dataset.floor));document.querySelectorAll('.unit[data-upper]').forEach(b=>b.onclick=()=>{selectedId=b.dataset.upper;draw()});$('back').onclick=()=>mapScreen.classList.remove('show');render();draw();</script></body></html>
