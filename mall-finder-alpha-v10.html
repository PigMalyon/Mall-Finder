<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Mall Finder Alpha V10</title>
<style>
:root{--green:#006b45;--blue:#0b6df2;--yellow:#ffd60a;--ink:#101828;--muted:#667085;--bg:#f4f7fb;--card:#fff;--line:#e4e7ec;--danger:#b42318;--amber:#b54708}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink)}button,input,select{font:inherit}.app{max-width:430px;margin:auto;min-height:100vh;background:#f8fafc;padding-bottom:86px}.top{background:linear-gradient(135deg,#032d25,#006b45);color:#fff;padding:20px 18px 22px;border-radius:0 0 28px 28px}.brand{display:flex;justify-content:space-between;align-items:center}.brand h1{margin:0;font-size:25px}.mall{font-size:13px;opacity:.9;margin-top:4px}.avatar{width:40px;height:40px;border-radius:50%;background:#ffffff20;display:grid;place-items:center;font-weight:800}.search{margin-top:16px}.search input{width:100%;border:0;border-radius:16px;padding:15px 16px;box-shadow:0 8px 24px #001b1433}.content{padding:16px}.tabs{display:flex;gap:8px;overflow:auto}.chip{white-space:nowrap;border:1px solid #d0d5dd;background:#fff;border-radius:999px;padding:9px 12px}.chip.active{background:#101828;color:#fff}.section{margin-top:18px}.section h2{font-size:17px;margin:0 0 10px}.card,.offer,.sheet{background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:0 8px 25px #1018280d}.offer{padding:14px;margin-bottom:10px}.row{display:flex;justify-content:space-between;gap:12px;align-items:center}.store{display:flex;gap:12px;align-items:center}.logo{width:46px;height:46px;border-radius:14px;background:#111;color:#fff;display:grid;place-items:center;font-weight:900}.meta h3{font-size:15px;margin:0 0 3px}.meta p{margin:0;color:var(--muted);font-size:12px}.price{font-size:18px;font-weight:900}.stock{font-size:12px;font-weight:800;margin-top:8px}.ok{color:#087443}.low{color:var(--amber)}.out{color:var(--danger)}.fresh{display:flex;gap:7px;align-items:center;margin-top:9px;color:var(--muted);font-size:12px}.dot{width:8px;height:8px;border-radius:50%;background:#12b76a}.dot.warn{background:#f79009}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.btn{border:0;border-radius:13px;padding:12px;font-weight:850}.green{background:var(--green);color:#fff}.yellow{background:var(--yellow)}.outline{background:#fff;border:1px solid #d0d5dd}.btn:disabled{opacity:.45}.banner{display:none;background:#ecfdf3;border:1px solid #abefc6;color:#05603a;border-radius:16px;padding:12px;margin-bottom:12px}.view{display:none}.sheet{padding:16px}.summary{background:#f2f4f7;border-radius:14px;padding:14px;margin-top:12px}.detail{padding:13px 0;border-bottom:1px solid var(--line)}.detail:last-child{border:0}.reservation{border:2px dashed #12b76a;background:#ecfdf3;border-radius:18px;padding:16px;text-align:center}.code{font-size:30px;letter-spacing:4px;font-weight:900;margin:10px 0}.admin{background:#101828;color:#fff;border-radius:18px;padding:16px}.admin select,.admin input{width:100%;margin-top:6px;border:0;border-radius:12px;padding:12px}.bottom{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:min(430px,100%);background:#fff;border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(4,1fr);padding:9px 6px max(12px,env(safe-area-inset-bottom));z-index:5}.bottom button{border:0;background:none;color:#667085;font-size:12px}.bottom b{display:block;font-size:19px}.bottom .active{color:var(--green);font-weight:900}.badge{background:var(--yellow);color:#111;border-radius:999px;padding:2px 7px;font-size:11px;font-weight:900}
</style></head>
<body><div class="app">
<header class="top"><div class="brand"><div><h1>Mall Finder</h1><div class="mall">📍 Vaal Mall · Alpha V10</div></div><div class="avatar">DM</div></div><div class="search"><input id="search" placeholder="Search products, brands or stores" value="Levi's 511"></div></header>
<main class="content"><div id="banner" class="banner"></div>
<section id="browse"><div class="tabs" id="tabs"></div><div class="section"><div class="row"><h2 id="title">Live offers</h2><span id="count"></span></div><div id="offers"></div></div></section>
<section id="detailView" class="view"><div class="sheet"><button class="btn outline" id="back">← Back</button><div id="detail"></div></div></section>
<section id="reservationView" class="view"><div class="reservation"><div style="font-size:44px">✓</div><h2>Item reserved</h2><p id="reserveText"></p><div class="code" id="reserveCode"></div><p style="color:#667085;font-size:13px">Show this code at the store. Reservation expires in <b id="timer">30:00</b>.</p><button class="btn green" id="navigate" style="width:100%">Navigate to store</button><button class="btn outline" id="cancel" style="width:100%;margin-top:8px">Cancel reservation</button></div></section>
<section id="alertsView" class="view"><div class="sheet"><h2>Stock alerts</h2><div id="alerts"></div></div></section>
<section id="adminView" class="view"><div class="admin"><h2 style="margin-top:0">Retailer inventory simulator</h2><label>Offer<select id="adminOffer"></select></label><label style="display:block;margin-top:12px">Quantity<input id="adminQty" type="number" min="0"></label><label style="display:block;margin-top:12px">Price<input id="adminPrice" type="number" min="0"></label><button class="btn yellow" id="sync" style="width:100%;margin-top:14px">Sync inventory now</button></div><div class="summary"><b>Integration status</b><p id="syncStatus" style="margin-bottom:0;color:#667085">Demo retailer feed connected.</p></div></section>
</main>
<nav class="bottom"><button id="browseTab" class="active"><b>⌕</b>Shop</button><button id="alertsTab"><b>🔔</b>Alerts</button><button id="reserveTab"><b>▣</b>Reserved</button><button id="adminTab"><b>⚙</b>Retailer</button></nav>
</div><script>
(()=>{"use strict";const $=id=>document.getElementById(id);const offers=[
{id:"levi-markham",product:"Levi's 511 Slim Jeans",brand:"Levi's",store:"Markham",size:"34",price:1199,qty:2,updated:2,entrance:"South entrance",walk:"3 min",confidence:98},
{id:"levi-edgars",product:"Levi's 511 Slim Jeans",brand:"Levi's",store:"Edgars",size:"34",price:1249,qty:1,updated:8,entrance:"Main entrance",walk:"4 min",confidence:94},
{id:"levi-truworths",product:"Levi's 511 Slim Jeans",brand:"Levi's",store:"Truworths Man",size:"34",price:1299,qty:0,updated:22,entrance:"East entrance",walk:"5 min",confidence:81},
{id:"nike-sportscene",product:"Nike Air Max Alpha Trainer 6",brand:"Nike",store:"Sportscene",size:"UK 9",price:1899,qty:3,updated:4,entrance:"North entrance",walk:"2 min",confidence:97},
{id:"ps5-game",product:"PlayStation 5 Slim Console",brand:"Sony",store:"Game",size:"Standard",price:11999,qty:1,updated:12,entrance:"Main entrance",walk:"6 min",confidence:90}
];let state={query:"Levi's 511",filter:"All",selected:null,reservation:JSON.parse(localStorage.getItem("mfReservation")||"null"),alerts:JSON.parse(localStorage.getItem("mfAlerts")||"[]"),timer:null};
const views=["browse","detailView","reservationView","alertsView","adminView"];function show(id){views.forEach(v=>$(v).style.display=v===id?"block":"none");document.querySelectorAll(".bottom button").forEach(b=>b.classList.remove("active"));if(id==="browse")$("browseTab").classList.add("active");if(id==="alertsView")$("alertsTab").classList.add("active");if(id==="reservationView")$("reserveTab").classList.add("active");if(id==="adminView")$("adminTab").classList.add("active");window.scrollTo({top:0,behavior:"smooth"})}function toast(m){$("banner").textContent=m;$("banner").style.display="block";setTimeout(()=>$("banner").style.display="none",3000)}
function status(o){if(o.qty===0)return["Out of stock","out"];if(o.qty<=2)return[`Only ${o.qty} left`,`low`];return[`${o.qty} in stock`,`ok`]}function freshness(o){return o.updated<=5?[`Updated ${o.updated} min ago · ${o.confidence}% confidence`,""]:[`Updated ${o.updated} min ago · ${o.confidence}% confidence`,"warn"]}function filtered(){const q=state.query.toLowerCase();return offers.filter(o=>(state.filter==="All"||state.filter===o.brand||state.filter===o.store)&&(o.product+o.brand+o.store).toLowerCase().includes(q))}
function renderTabs(){const values=["All",...new Set(offers.flatMap(o=>[o.brand,o.store]))];$("tabs").innerHTML=values.map(v=>`<button class="chip ${v===state.filter?"active":""}" data-filter="${v}">${v}</button>`).join("");document.querySelectorAll("[data-filter]").forEach(b=>b.onclick=()=>{state.filter=b.dataset.filter;renderTabs();renderOffers()})}function renderOffers(){const list=filtered();$("count").textContent=`${list.length} offer${list.length===1?"":"s"}`;$("offers").innerHTML=list.map(o=>{const s=status(o),f=freshness(o);return`<article class="offer"><div class="row"><div class="store"><div class="logo">${o.store.slice(0,2).toUpperCase()}</div><div class="meta"><h3>${o.product}</h3><p>${o.store} · Size ${o.size} · ${o.walk}</p></div></div><div class="price">R${o.price.toLocaleString()}</div></div><div class="stock ${s[1]}">${s[0]}</div><div class="fresh"><i class="dot ${f[1]}"></i>${f[0]}</div><div class="actions"><button class="btn green" data-view="${o.id}">View details</button><button class="btn yellow" data-reserve="${o.id}" ${o.qty===0?"disabled":""}>Reserve</button></div></article>`}).join("")||`<div class="offer" style="text-align:center;color:#667085">No matching live offers.</div>`;document.querySelectorAll("[data-view]").forEach(b=>b.onclick=()=>openDetail(b.dataset.view));document.querySelectorAll("[data-reserve]").forEach(b=>b.onclick=()=>reserve(b.dataset.reserve))}
function openDetail(id){const o=offers.find(x=>x.id===id);state.selected=o;const s=status(o),f=freshness(o);$("detail").innerHTML=`<div class="section"><div class="logo" style="width:64px;height:64px">${o.store.slice(0,2).toUpperCase()}</div><h2>${o.product}</h2><p style="color:#667085">${o.store} · ${o.brand} · Size ${o.size}</p><div class="price">R${o.price.toLocaleString()}</div><div class="stock ${s[1]}">${s[0]}</div><div class="summary"><b>Inventory confidence</b><p>${f[0]}</p><small>Confidence combines retailer feed freshness, recent sales velocity and last successful sync.</small></div><div class="detail"><b>Nearest entrance</b><br><small>${o.entrance} · ${o.walk} walk</small></div><div class="detail"><b>Collection window</b><br><small>Hold for 30 minutes after confirmation</small></div><div class="actions"><button class="btn green" id="reserveDetail" ${o.qty===0?"disabled":""}>Reserve item</button><button class="btn outline" id="alertDetail">${state.alerts.includes(o.id)?"Alert active":"Notify me"}</button></div></div>`;$("reserveDetail").onclick=()=>reserve(o.id);$("alertDetail").onclick=()=>toggleAlert(o.id);show("detailView")}
function reserve(id){const o=offers.find(x=>x.id===id);if(!o||o.qty<1)return;const code=Math.random().toString(36).slice(2,8).toUpperCase();state.reservation={offerId:id,code,expires:Date.now()+30*60*1000};localStorage.setItem("mfReservation",JSON.stringify(state.reservation));o.qty--;renderReservation();show("reservationView")}function renderReservation(){clearInterval(state.timer);const r=state.reservation;if(!r){$("reserveText").textContent="No active reservation.";$("reserveCode").textContent="—";$("timer").textContent="00:00";$("navigate").disabled=true;$("cancel").disabled=true;return}const o=offers.find(x=>x.id===r.offerId);$("reserveText").textContent=`${o.product} at ${o.store}`;$("reserveCode").textContent=r.code;$("navigate").disabled=false;$("cancel").disabled=false;const tick=()=>{const left=Math.max(0,r.expires-Date.now()),m=Math.floor(left/60000),s=Math.floor(left%60000/1000);$("timer").textContent=`${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;if(!left){clearInterval(state.timer);cancelReservation("Reservation expired.")}};tick();state.timer=setInterval(tick,1000)}function cancelReservation(message="Reservation cancelled."){state.reservation=null;localStorage.removeItem("mfReservation");renderReservation();renderOffers();toast(message)}
function toggleAlert(id){state.alerts=state.alerts.includes(id)?state.alerts.filter(x=>x!==id):[...state.alerts,id];localStorage.setItem("mfAlerts",JSON.stringify(state.alerts));openDetail(id)}function renderAlerts(){const list=state.alerts.map(id=>offers.find(o=>o.id===id)).filter(Boolean);$("alerts").innerHTML=list.length?list.map(o=>`<div class="offer"><b>${o.product}</b><p>${o.store} · R${o.price.toLocaleString()}</p><span class="badge">Watching stock & price</span><button class="btn outline" data-remove-alert="${o.id}" style="width:100%;margin-top:10px">Remove alert</button></div>`).join(""):`<p style="color:#667085">No stock alerts yet.</p>`;document.querySelectorAll("[data-remove-alert]").forEach(b=>b.onclick=()=>{toggleAlert(b.dataset.removeAlert);renderAlerts();show("alertsView")})}
function renderAdmin(){$("adminOffer").innerHTML=offers.map(o=>`<option value="${o.id}">${o.product} — ${o.store}</option>`).join("");loadAdmin()}function loadAdmin(){const o=offers.find(x=>x.id===$("adminOffer").value)||offers[0];$("adminQty").value=o.qty;$("adminPrice").value=o.price}function sync(){const o=offers.find(x=>x.id===$("adminOffer").value);o.qty=Math.max(0,+$("adminQty").value||0);o.price=Math.max(0,+$("adminPrice").value||0);o.updated=0;o.confidence=99;$("syncStatus").textContent=`${o.store} synced just now. ${o.qty} units at R${o.price.toLocaleString()}.`;renderOffers();toast("Retailer inventory feed updated.")}
$("search").oninput=e=>{state.query=e.target.value;state.filter="All";renderTabs();renderOffers();show("browse")};$("back").onclick=()=>show("browse");$("browseTab").onclick=()=>show("browse");$("alertsTab").onclick=()=>{renderAlerts();show("alertsView")};$("reserveTab").onclick=()=>{renderReservation();show("reservationView")};$("adminTab").onclick=()=>{renderAdmin();show("adminView")};$("cancel").onclick=()=>cancelReservation();$("navigate").onclick=()=>toast("Route started from your nearest entrance.");$("adminOffer").onchange=loadAdmin;$("sync").onclick=sync;renderTabs();renderOffers();renderReservation();renderAdmin();})();
</script></body></html>
